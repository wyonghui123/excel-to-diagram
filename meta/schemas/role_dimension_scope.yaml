id: role_dimension_scope
name: 角色维度范围
table_name: role_dimension_scopes
description: 角色的管理维度范围声明，是权限推导的入口。
bo_category: configuration
bo_sub_category: customizing

fields:
  - id: id
    name: ID
    type: integer
    db_column: id
    required: true
    unique: true

  - id: role_id
    name: 角色ID
    type: integer
    db_column: role_id
    required: true

  - id: dimension_code
    name: 维度编码
    type: string
    db_column: dimension_code
    required: true
    max_length: 100

  - id: dimension_values
    name: 维度值列表
    type: json
    db_column: dimension_values
    required: true

  - id: inherit_children
    name: 包含下级
    type: boolean
    db_column: inherit_children
    default: true

  - id: scope_mode
    name: 范围模式
    type: string
    db_column: scope_mode
    default: include
    enum_values:
      - include
      - exclude

# ============================================
# 9 模式 UI 测试配置 (auto-completed by enrich_schemas.py)
# ============================================

ui_badge:
  inherit_children:
    color_map:
      true: success
      false: info
  scope_mode:
    color_map:
      include: info
      exclude: info

routes:
  detail: /detail/role_dimension_scope/role_dimension_scope-detail
  list: /role_dimension_scope-management

list:
  pagination:
    default_page_size: 20
    page_size_options: [10, 20, 50, 100]

nested:
  enabled: False

persistence:
  strategy: audit_log
  survive_reload: True
