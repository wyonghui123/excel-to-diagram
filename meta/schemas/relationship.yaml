# ────────────────────────────────────────────
# 校验规则
# ────────────────────────────────────────────

# ────────────────────────────────────────────
# 索引定义（元数据驱动，借鉴 SAP CDS @AbapCatalog.index）
# ────────────────────────────────────────────
# 关系表是查询最密集的表，索引策略至关重要：
# - 按版本+源端/目标端查询是最高频路径
# - 关系类型筛选是常见操作
# - 规则引擎会自动推导 version_id + parent_id 复合索引
# ────────────────────────────────────────────
indexes:
  - name: uidx_relationships_version_source_target_type
    fields: [version_id, source_bo_id, target_bo_id, relation_code]
    type: unique
    priority: high
    description: "版本+源+目标+类型唯一索引（防止重复关系）"

  # [2026-06-15] 业务层 + DB 层联合校验：源+目标+方向在版本内唯一
  #   解决: 历史 bug (id=101 vs id=129 同源同目标同方向但 code 不同 / relation_code 一空一有)
  #   原因: 现有 uidx_relationships_version_source_target_type 用的是 relation_code 字段,
  #         KeyTemplate 失败时 relation_code 为空字符串, 绕过了唯一性
  #   修复: 加源+目标+方向的唯一约束
  #   - 业务层: MetadataDrivenValidator._check_unique_indexes 校验 (manage_service.create 唯一入口, Excel 导入也走这里)
  #   - DB 层: 生成 unique index 防 race / 防漏
  #   - 保留 PUSH/PULL/BIDIRECTIONAL 三个方向独立唯一 (方向不同允许同源同目标)
  #   - relation_direction 为 NULL 的记录不在约束范围内 (schema 中 required: false)
  - name: uidx_relationships_version_source_target_direction
    fields: [version_id, source_bo_id, target_bo_id, relation_direction]
    type: unique
    priority: high
    description: "版本+源+目标+方向唯一索引（防同源同目标同方向重复关系，relation_direction 为空时跳过）"

  - name: idx_relationships_version_source
    fields: [version_id, source_bo_id]
    type: composite
    priority: high
    description: "版本+源端复合索引（查询某BO的所有出边关系）"

  - name: idx_relationships_version_target
    fields: [version_id, target_bo_id]
    type: composite
    priority: high
    description: "版本+目标端复合索引（查询某BO的所有入边关系）"

  - name: idx_relationships_version_type
    fields: [version_id, relation_code]
    type: composite
    priority: medium
    description: "版本+关系类型复合索引（按类型筛选关系）"

validations:
  - id: version_id_required
    name: 版本ID必填
    type: field
    rule: version_id is not None
    message: 版本ID不能为空
    severity: error

  - id: source_not_equal_target
    name: 源目标不能相同
    type: cross_field
    rule: source_bo_id != target_bo_id
    message: 源业务对象和目标业务对象不能相同
    severity: error

  # [v34 fix] 关系编码唯一性 (整库内 (version_id, code) 联合唯一)
  - id: code_unique_within_version
    name: 关系编码在版本内唯一
    type: unique
    rule: (version_id, code) 联合唯一
    scope: version_id
    fields: [code]
    message: 关系编码 "{code}" 在当前版本中已存在，请使用唯一编码
    severity: error

  # [v34 fix] 关系类型必须是 enum 有效值
  - id: relation_type_in_enum
    name: 关系类型必须在枚举中
    type: field
    rule: relation_type in ('GENERATES', 'UPDATES', 'TRIGGERS', 'REFERENCES')
    message: '关系类型 "{relation_type}" 不在允许的枚举值中 (GENERATES/UPDATES/TRIGGERS/REFERENCES)'
    severity: error

  # [v34 fix] 关系方向必须是 enum 有效值 (允许空)
  - id: relation_direction_in_enum
    name: 关系方向必须在枚举中
    type: field
    rule: relation_direction is None or relation_direction in ('PUSH', 'PULL', 'BIDIRECTIONAL')
    message: '关系方向 "{relation_direction}" 不在允许的枚举值中 (PUSH/PULL/BIDIRECTIONAL)'
    severity: error

  # [v34 fix] 关系简称非空
  - id: relation_code_required
    name: 关系简称必填
    type: field
    rule: relation_code is not None and relation_code != ''
    message: 关系简称不能为空
    severity: error

