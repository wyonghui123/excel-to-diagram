          label: 编辑
        - key: delete
          label: 删除
          danger: true

  form:
    sections:
      - title: 版本信息
        fields:
          - version_id
      - title: 关系端点
        layout: row
        columns:
          - title: 源业务对象
            fields:
              - source_domain_id
              - source_sub_domain_id
              - source_service_module_id
              - source_bo_id
          - title: 目标业务对象
            fields:
              - target_domain_id
              - target_sub_domain_id
              - target_service_module_id
              - target_bo_id
      - title: 关系信息
        fields:
          - code
          - relation_type
          - relation_direction
          - relation_desc

  filter:
    layout: sidebar
    filters:
      - key: product_id
        title: 产品
        type: select
        source: product
        display_field: name
        position: 0
        required: true

      - key: version_id
        title: 版本
        type: select
        source: version
        display_field: name
        position: 1
        required: true
        filter_by: product_id

      - key: business_object
        title: 中心范围选择
        type: tree
        tree_structure: hierarchy
        tree_levels:
          - domain
          - sub_domain
          - service_module
          - business_object
        leaf_value_field: id
        show_count: true
        position: 2
        default: all
        filter_by: version_id

      - key: category_type
        title: 关系范围
        type: select
        source: enum_value
        enum_type: hierarchy_scope_type
        display_field: name
        position: 3
        default: all
        filter_by: version_id

      - key: relation_code
        title: 关系类型
        type: select
        source: enum_value
        enum_type: relation_type
        display_field: name
        position: 4
  change_notification:
    enabled: true
    events:
      - type: create
        channels: [in_app]
        track_fields: [source_code, target_code, relation_code]
        payload: [id, source_code, target_code, relation_code]
      - type: update
        channels: [in_app]
        track_fields: [relation_code, source_code, target_code]
        payload: [id, source_code, target_code, relation_code]
      - type: delete
        channels: [in_app]
        track_fields: []
        payload: [id, source_code, target_code, relation_code]

