# ============================================
# 业务关系元模型
# 层级: 7 (跨层级关系)
# 说明: 业务关系描述业务对象之间的关联关系，如依赖、调用、数据流转等
#
# 【架构原则】
# 本文件遵循语义模型驱动架构原则，详见：docs/ARCHITECTURE_PRINCIPLES.md
# - 单一事实源：通过 scope_rules_ref 引用 hierarchies.yaml 中的规则定义
# - 声明式配置：字段行为通过 semantics 声明，不硬编码
# - 元数据驱动：系统行为由 YAML 配置决定
# ============================================

id: relationship
name: 业务关系
table_name: relationships
description: 业务关系描述业务对象之间的关联关系，如依赖、调用、数据流转等。
display_name_field: relation_desc
parent_object: version
aspects: [hierarchy_aspect, audit_aspect]

# Audit configuration
audit:
  enabled: true
  create:
    enabled: true
    fields: all
  update:
    enabled: true
    fields: changed_only
    exclude:
      - id
      - created_at
      - updated_at
      - created_by
      - updated_by
      - source_domain_name
      - target_domain_name
      - source_sub_domain_name
      - target_sub_domain_name
      - source_service_module_name
      - target_service_module_name
      - source_product_name
      - target_product_name
      - source_version_name
      - target_version_name
      - source_bo_name
      - target_bo_name
      - source_code
      - target_code
  delete:
    enabled: true
    fields: business_only
    exclude:
      - id
      - created_at
      - updated_at
      - created_by
      - updated_by

deletability:
  condition: "true"
  message: "关系可随时删除"

authorization:
  check: true
  # 🆕 v1.1 owner refactor (TBD-8): 通过 version_id → product 链追溯 (TBD-12 走显式表)
  scope: "version_id IN (SELECT v.id FROM versions v JOIN products p ON v.product_id = p.id WHERE p.visibility = 'public' OR p.owner_id = $user.id)"
  # 🆕 TBD-9: 关闭 auto_owner (relationship 本来就没有 owner_id 字段)
  auto_owner: false
  # 🆕 TBD-11: 保留 auto_permission=admin
  auto_permission: admin
  # 🆕 TBD-10: relationship 关系是 cross-version 的, 不继承给子
  inherit_to_children: false
  # 🆕 v1.1: relationship 不再独立 transfer
  allow_transfer: false
  # relationship 之前就没有 owner, transfer_keep_permissions 默认 false
  transfer_keep_permissions: false

context:
  field: version_id
  description: "版本上下文，所有查询自动注入 version_id 过滤"

cascade_select:
  - field: source_domain_id
    parent_object: domain
    parent_display_field: name
    filter_by: version_id
  - field: source_sub_domain_id
    parent_object: sub_domain
    parent_display_field: name
    filter_by: source_domain_id
  - field: source_service_module_id
    parent_object: service_module
    parent_display_field: name
    filter_by: source_sub_domain_id
  - field: source_bo_id
    parent_object: business_object
    parent_display_field: name
    filter_by: source_service_module_id
  - field: target_domain_id
    parent_object: domain
    parent_display_field: name
    filter_by: version_id
  - field: target_sub_domain_id
    parent_object: sub_domain
    parent_display_field: name
    filter_by: target_domain_id
  - field: target_service_module_id
    parent_object: service_module
    parent_display_field: name
    filter_by: target_sub_domain_id
  - field: target_bo_id
    parent_object: business_object
    parent_display_field: name
    filter_by: target_service_module_id

# ────────────────────────────────────────────
# 语义标注
# ────────────────────────────────────────────
semantics:
  meaning: 业务对象之间的关联关系
  business_key: false
  display_name: true
  category: relationship
  hierarchy_level: 7
  aliases:
    - 关系
    - Relationship
    - 业务关系
    - 关联
  custom:
    color_coding: relationship
    icon: link

# ────────────────────────────────────────────
# KeyTemplate 自动编码
# ────────────────────────────────────────────
key_template:
  enabled: true
  # [NEW v1.1 2026-06-11] 自动/可手动混合模式
  user_editable: auto_or_manual
  auto_suggest: true
  pattern: "{source_code}-{target_code}-{SEQ:2}"
  separator: "-"
  segments:
    - type: parent_field
      source: source_code
    - type: separator
      value: "-"
    - type: parent_field
      source: target_code
    - type: separator
      value: "-"
    - type: sequence
      name: rel_code_seq
      scope: source_code
      auto_detect: true
      padding: 2
      start: 1
  preview: "ORDER-USER-01"

# ────────────────────────────────────────────
# 导入导出配置
# ────────────────────────────────────────────
import_export:
  import_enabled: true
  export_enabled: true
  cascade_export: false             # 关系是叶子节点
  cascade_import: false
  conflict_strategy: upsert
  conflict_key: ""                  # 关系使用source_code+target_code+relation_type组合判断
  description_for_agent: "业务关系描述业务对象之间的关联关系，如依赖、调用、数据流转等。导入时需要源对象和目标对象的编码已存在。"

# ────────────────────────────────────────────
# 分析模型定义
# ────────────────────────────────────────────
analytical_model:
  enabled: true
  
  fact:
    table: relationships
    alias: r
    measures:
      - id: relation_count
        field: id
        aggregation: count
        display_name: 关系数量
        format: "#,##0"
      
      - id: distinct_source_count
        field: source_bo_id
        aggregation: count_distinct
        display_name: 源对象数
      
      - id: distinct_target_count
        field: target_bo_id
        aggregation: count_distinct
        display_name: 目标对象数
  
  dimensions:
    - id: version_id
      field: r.version_id
      display_name: 版本
      hierarchy_level: 1
    
    - id: relation_code
      field: r.relation_code
      display_name: 关系类型
      hierarchy_level: 2
    
    - id: source_domain_id
      field: d.id
      display_name: 源领域
      hierarchy_level: 3
      join_path:
        - table: business_objects bo
          from: source_bo_id
          to: id
        - table: service_modules sm
          from: service_module_id
          to: id
        - table: sub_domains sd
          from: sub_domain_id
          to: id
        - table: domains d
          from: domain_id
          to: id
    
    - id: target_domain_id
      field: d2.id
      display_name: 目标领域
      hierarchy_level: 3
      join_path:
        - table: business_objects bo2
          from: target_bo_id
          to: id
        - table: service_modules sm2
          from: service_module_id
          to: id
        - table: sub_domains sd2
          from: sub_domain_id
          to: id
        - table: domains d2
          from: domain_id
          to: id
  
  aggregates:
    - id: version_relation_stats
      name: 版本关系统计
      type: materialized
      dimensions: [version_id, relation_code]
      measures: [relation_count, distinct_source_count, distinct_target_count]
      refresh: on_change
      storage:
        table: agg_version_relation_stats
        cache_ttl: 300
    
    - id: domain_relation_stats
      name: 领域关系统计
      type: materialized
      dimensions: [source_domain_id, target_domain_id, relation_code]
      measures: [relation_count]
      refresh: on_change
      storage:
        table: agg_domain_relation_stats
        cache_ttl: 300
  
  # ────────────────────────────────────────────
  # 跨表过滤配置
  # ────────────────────────────────────────────
  cross_table_filters:
    - id: annotation_category
      display_name: 备注类型
      description: 按备注类型过滤包含该类型备注的关系
      
      association:
        target_table: annotations
        target_alias: a
        join_type: exists
        
        on_conditions:
          - left_field: r.id
            operator: eq
            right_field: a.target_id
          - left_field: "'relationship'"
            operator: eq
            right_field: a.target_type
        
        where_conditions:
          - field: a.category
            operator: in
            parameter: annotation_category
      
      ui:
        filter_type: multi-select
        filter_label: 备注类型
        filter_placeholder: 请选择备注类型
        options_source: enum
        enum_type: annotation_category
        position: 50
    
    - id: annotation_content_search
      display_name: 备注内容
      description: 按备注内容模糊搜索关系

      association:
        target_table: annotations
        target_alias: a
        join_type: exists

        on_conditions:
          - left_field: r.id
            operator: eq
            right_field: a.target_id
          - left_field: "'relationship'"
            operator: eq
            right_field: a.target_type

        where_conditions:
          - field: a.content
            operator: like
            parameter: annotation_content_search

    # [V1.2.5 2026-06-17] 链式过滤: 源/目标 领域/子领域/服务模块 → 反查 BO ids 再过滤 relationships
    # 列表列头 ValueHelp 选中 domain/sub_domain/service_module 后, 前端发这些参数,
    # 后端通过 EXISTS 子查询把 "用户选 domain=703" 转换为 "source_bo_id IN (sub_domain=703 下所有 BO ids)"
    # 关系表本身没有 domain_id/sub_domain_id/service_module_id 字段, 必须通过 JOIN 业务对象/服务模块/子领域/领域层级表派生.
    # SQL 形态: EXISTS (SELECT 1 {from_join} WHERE {main_table.source_bo_id = bo_src.id AND ... AND {chain_table.filter_col} IN (?))

    - id: source_domain_id
      display_name: 源领域
      description: 按源业务对象所属领域过滤关系 (通过 business_objects→service_modules→sub_domains→domains 链)

      association:
        target_table: domains
        target_alias: d_src
        join_type: exists

        on_conditions:
          - left_field: r.source_bo_id
            operator: eq
            right_field: bo_src.id
          - left_field: bo_src.service_module_id
            operator: eq
            right_field: sm_src.id
          - left_field: sm_src.sub_domain_id
            operator: eq
            right_field: sd_src.id

        from_join: |
          FROM business_objects bo_src
          JOIN service_modules sm_src ON bo_src.service_module_id = sm_src.id
          JOIN sub_domains sd_src ON sm_src.sub_domain_id = sd_src.id

        where_conditions:
          - field: sd_src.domain_id
            operator: in
            parameter: source_domain_id

    - id: source_sub_domain_id
      display_name: 源子领域
      description: 按源业务对象所属子领域过滤关系

      association:
        target_table: sub_domains
        target_alias: sd_src
        join_type: exists

        on_conditions:
          - left_field: r.source_bo_id
            operator: eq
            right_field: bo_src.id
          - left_field: bo_src.service_module_id
            operator: eq
            right_field: sm_src.id

        from_join: |
          FROM business_objects bo_src
          JOIN service_modules sm_src ON bo_src.service_module_id = sm_src.id

        where_conditions:
          - field: sm_src.sub_domain_id
            operator: in
            parameter: source_sub_domain_id

    - id: source_service_module_id
      display_name: 源服务模块
      description: 按源业务对象所属服务模块过滤关系

      association:
        target_table: service_modules
        target_alias: sm_src
        join_type: exists

        on_conditions:
          - left_field: r.source_bo_id
            operator: eq
            right_field: bo_src.id

        from_join: |
          FROM business_objects bo_src

        where_conditions:
          - field: bo_src.service_module_id
            operator: in
            parameter: source_service_module_id

    - id: target_domain_id
      display_name: 目标领域
      description: 按目标业务对象所属领域过滤关系

      association:
        target_table: domains
        target_alias: d_tgt
        join_type: exists

        on_conditions:
          - left_field: r.target_bo_id
            operator: eq
            right_field: bo_tgt.id
          - left_field: bo_tgt.service_module_id
            operator: eq
            right_field: sm_tgt.id
          - left_field: sm_tgt.sub_domain_id
            operator: eq
            right_field: sd_tgt.id

        from_join: |
          FROM business_objects bo_tgt
          JOIN service_modules sm_tgt ON bo_tgt.service_module_id = sm_tgt.id
          JOIN sub_domains sd_tgt ON sm_tgt.sub_domain_id = sd_tgt.id

        where_conditions:
          - field: sd_tgt.domain_id
            operator: in
            parameter: target_domain_id

    - id: target_sub_domain_id
      display_name: 目标子领域
      description: 按目标业务对象所属子领域过滤关系

      association:
        target_table: sub_domains
        target_alias: sd_tgt
        join_type: exists

        on_conditions:
          - left_field: r.target_bo_id
            operator: eq
            right_field: bo_tgt.id
          - left_field: bo_tgt.service_module_id
            operator: eq
            right_field: sm_tgt.id

        from_join: |
          FROM business_objects bo_tgt
          JOIN service_modules sm_tgt ON bo_tgt.service_module_id = sm_tgt.id

        where_conditions:
          - field: sm_tgt.sub_domain_id
            operator: in
            parameter: target_sub_domain_id

    - id: target_service_module_id
      display_name: 目标服务模块
      description: 按目标业务对象所属服务模块过滤关系

      association:
        target_table: service_modules
        target_alias: sm_tgt
        join_type: exists

        on_conditions:
          - left_field: r.target_bo_id
            operator: eq
            right_field: bo_tgt.id

        from_join: |
          FROM business_objects bo_tgt

        where_conditions:
          - field: bo_tgt.service_module_id
            operator: in
            parameter: target_service_module_id

# ────────────────────────────────────────────
# 字段定义
# ────────────────────────────────────────────
fields:
  - id: version_code
    name: 版本编码
    type: string
    description: 所属版本编码
    semantics:
      meaning: 版本编码，用于跨环境数据迁移
      business_key: true
      import_order: 1
      virtual: true
      export_visible: false
      import_visible: false
    ui:
      visible: false

  - id: id
    name: ID
    type: integer
    db_column: id
    required: true
    unique: true
    description: 技术主键
    ui:
      visible: false
      editable: false
    semantics:
      meaning: 自增主键，系统内部使用
      analytics:
        category: measure
        aggregation: count
        display_name: 关系数量

  - id: version_id
    name: 版本
    type: integer
    db_column: version_id
    required: true
    description: 所属版本
    ui:
      widget: select
      relation: version
      display_field: name
      cascade_group: relationship
      cascade_level: 1
    semantics:
      meaning: 关联的产品版本
      parent_key: true
      readonly_always: true
      context_field: true
      analytics:
        category: dimension
        type: foreign_key
        display_name: 版本
    value_help:
      source:
        type: bo
        target_bo: version
        value_field: id
        display_field: name
        code_field: code
        apply_target_permissions: false
      behavior:
        validation: true
        binding_strength: strict
        multiple: false  # 详情表单应为单选，不是多选
      presentation:
        result_type: dropdown
        display_format: "{code} - {name}"
        columns:
          - field: code
            label: 编码
            width: 120
          - field: name
            label: 名称
            width: 200

  - id: source_domain_id
    name: 源领域
    type: integer
    description: 源业务对象所属领域（用于级联筛选业务对象）
    storage: virtual
    ui:
      widget: select
      relation: domain
      display_field: name
      depends_on: version_id
      cascade_group: relationship
      cascade_level: 2
    semantics:
      meaning: Search Help - 用于级联筛选源端业务对象
      search_help_for: source_bo_id
      immutable: true
      export_visible: false
      redundancy:
        type: virtual
        source_field: source_bo_id
        derived_from: sub_domain.domain_id
        join_path:
          - table: business_objects
            from: source_bo_id
            to: id
            select: service_module_id
          - table: service_modules
            from: service_module_id
            to: id
            select: sub_domain_id
          - table: sub_domains
            from: sub_domain_id
            to: id
            select: domain_id
    value_help:
      source:
        type: bo
        target_bo: domain
        value_field: id
        display_field: name
        code_field: code
        apply_target_permissions: true
        write_scope_policy: enforce
      behavior:
        validation: true
        binding_strength: strict
        parameter_bindings:
          - local_field: version_id
            target_field: version_id
            required: true
      presentation:
        result_type: dropdown
        display_format: "{code} - {name}"
        columns:
          - field: code
            label: 编码
            width: 120
          - field: name
            label: 名称
            width: 200

  - id: source_sub_domain_id
    name: 源子领域
    type: integer
    description: 源业务对象所属子领域（用于级联筛选业务对象）
    storage: virtual
    ui:
      widget: select
      relation: sub_domain
      display_field: name
      depends_on: source_domain_id
      cascade_group: relationship
      cascade_level: 3
    semantics:
      meaning: Search Help - 用于级联筛选源端业务对象
      search_help_for: source_bo_id
      immutable: true
      export_visible: false
      redundancy:
        type: virtual
        source_field: source_bo_id
        derived_from: service_module.sub_domain_id
        join_path:
          - table: business_objects
            from: source_bo_id
            to: id
            select: service_module_id
          - table: service_modules
            from: service_module_id
            to: id
            select: sub_domain_id
    value_help:
      source:
        type: bo
        target_bo: sub_domain
        value_field: id
        display_field: name
        code_field: code
        apply_target_permissions: true
        write_scope_policy: inherit
        scope_inherit_from: source_domain_id
      behavior:
        validation: true
        binding_strength: strict
        parameter_bindings:
          - local_field: source_domain_id
            target_field: domain_id
            required: true
      presentation:
        result_type: dropdown
        display_format: "{code} - {name}"
        columns:
          - field: code
            label: 编码
            width: 120
          - field: name
            label: 名称
            width: 200

  - id: source_service_module_id
    name: 源服务模块
    type: integer
    description: 源业务对象所属服务模块（用于级联筛选业务对象）
    storage: virtual
    ui:
      widget: select
      relation: service_module
      display_field: name
      depends_on: source_sub_domain_id
      cascade_group: relationship
      cascade_level: 4
    semantics:
      meaning: Search Help - 用于级联筛选源端业务对象
      search_help_for: source_bo_id
      immutable: true
      export_visible: false
      redundancy:
        type: virtual
        source_field: source_bo_id
        derived_from: business_object.service_module_id
        join_path:
          - table: business_objects
            from: source_bo_id
            to: id
            select: service_module_id
    value_help:
      source:
        type: bo
        target_bo: service_module
        value_field: id
        display_field: name
        code_field: code
        apply_target_permissions: true
        write_scope_policy: inherit
        scope_inherit_from: source_sub_domain_id
      behavior:
        validation: true
        binding_strength: strict
        parameter_bindings:
          - local_field: source_sub_domain_id
            target_field: sub_domain_id
            required: true
      presentation:
        result_type: dropdown
        display_format: "{code} - {name}"
        columns:
          - field: code
            label: 编码
            width: 120
          - field: name
            label: 名称
            width: 200

  - id: target_domain_id
    name: 目标领域
    type: integer
    description: 目标业务对象所属领域（用于级联筛选业务对象）
    storage: virtual
    ui:
      widget: select
      relation: domain
      display_field: name
      depends_on: version_id
      cascade_group: relationship
      cascade_level: 2
    semantics:
      meaning: Search Help - 用于级联筛选目标端业务对象
      search_help_for: target_bo_id
      immutable: true
      export_visible: false
      redundancy:
        type: virtual
        source_field: target_bo_id
        derived_from: sub_domain.domain_id
        join_path:
          - table: business_objects
            from: target_bo_id
            to: id
            select: service_module_id
          - table: service_modules
            from: service_module_id
            to: id
            select: sub_domain_id
          - table: sub_domains
            from: sub_domain_id
            to: id
            select: domain_id
    value_help:
      source:
        type: bo
        target_bo: domain
        value_field: id
        display_field: name
        code_field: code
        apply_target_permissions: false
        write_scope_policy: none
      behavior:
        validation: true
        binding_strength: strict
        parameter_bindings:
          - local_field: version_id
            target_field: version_id
            required: true
      presentation:
        result_type: dropdown
        display_format: "{code} - {name}"
        columns:
          - field: code
            label: 编码
            width: 120
          - field: name
            label: 名称
            width: 200

  - id: target_sub_domain_id
    name: 目标子领域
    type: integer
    description: 目标业务对象所属子领域（用于级联筛选业务对象）
    storage: virtual
    ui:
      widget: select
      relation: sub_domain
      display_field: name
      depends_on: target_domain_id
      cascade_group: relationship
      cascade_level: 3
    semantics:
      meaning: Search Help - 用于级联筛选目标端业务对象
      search_help_for: target_bo_id
      immutable: true
      export_visible: false
      redundancy:
        type: virtual
        source_field: target_bo_id
        derived_from: service_module.sub_domain_id
        join_path:
          - table: business_objects
            from: target_bo_id
            to: id
            select: service_module_id
          - table: service_modules
            from: service_module_id
            to: id
            select: sub_domain_id
    value_help:
      source:
        type: bo
        target_bo: sub_domain
        value_field: id
        display_field: name
        code_field: code
