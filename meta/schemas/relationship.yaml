# ────────────────────────────────────────────
# 关联关系
# ────────────────────────────────────────────
relations:
  - id: rel_to_version
    name: 归属版本
    type: parent_child
    target: version
    cardinality: "N:1"
    description: 关系归属的版本
    semantics:
      meaning: 关系与版本的层级关系

  - id: rel_to_source_bo
    name: 源业务对象
    type: reference
    target: business_object
    cardinality: "N:1"
    description: 关系的源端业务对象
    semantics:
      meaning: 关系与源业务对象的引用关系

  - id: rel_to_target_bo
    name: 目标业务对象
    type: reference
    target: business_object
    cardinality: "N:1"
    description: 关系的目标端业务对象
    semantics:
      meaning: 关系与目标业务对象的引用关系

# ────────────────────────────────────────────
# 操作定义
# ────────────────────────────────────────────
actions:
  - id: relationship_create
    name: 创建关系
    type: crud
    method: POST
    path: /api/v1/relationships
    description: 创建新的关系

  - id: relationship_read
    name: 查询关系
    type: crud
    method: GET
    path: /api/v1/relationships/{id}
    description: 查询单个关系

  - id: relationship_list
    name: 列表查询
    type: crud
    method: GET
    path: /api/v1/relationships
    description: 查询关系列表

  - id: relationship_update
    name: 更新关系
    type: crud
    method: PUT
    path: /api/v1/relationships/{id}
    description: 更新关系信息

  - id: relationship_delete
    name: 删除关系
    type: crud
    method: DELETE
    path: /api/v1/relationships/{id}
    description: 删除单个关系

  - id: batch_import
    name: 批量导入
    type: business
    method: POST
    path: /api/v1/relationships/import
    description: 从Excel批量导入关系

# ────────────────────────────────────────────
# 校验规则
# ────────────────────────────────────────────

# ────────────────────────────────────────────
# 索引定义（元数据驱动，借鉴 SAP CDS @AbapCatalog.index）
# ────────────────────────────────────────────
# 关系表是查询最密集的表，索引策略至关重要：
# - 按版本+源端/目标端查询是最高频路径
# - 关系类型筛选是常见操作
# - 规则引擎会自动推导 version_id + parent_id 复合索引
# ────────────────────────────────────────────
indexes:
  - name: uidx_relationships_version_source_target_type
    fields: [version_id, source_bo_id, target_bo_id, relation_code]
    type: unique
    priority: high
    description: "版本+源+目标+类型唯一索引（防止重复关系）"

  - name: idx_relationships_version_source
    fields: [version_id, source_bo_id]
    type: composite
    priority: high
    description: "版本+源端复合索引（查询某BO的所有出边关系）"

  - name: idx_relationships_version_target
    fields: [version_id, target_bo_id]
    type: composite
    priority: high
    description: "版本+目标端复合索引（查询某BO的所有入边关系）"

  - name: idx_relationships_version_type
    fields: [version_id, relation_code]
    type: composite
    priority: medium
    description: "版本+关系类型复合索引（按类型筛选关系）"

validations:
  - id: version_id_required
    name: 版本ID必填
    type: field
    rule: version_id is not None
    message: 版本ID不能为空
    severity: error

  - id: source_not_equal_target
    name: 源目标不能相同
    type: cross_field
    rule: source_bo_id != target_bo_id
    message: 源业务对象和目标业务对象不能相同
    severity: error

# ────────────────────────────────────────────
# UI 视图配置
# ────────────────────────────────────────────
ui_view_config:
  list:
    pageSize: 20
    columns:
      - key: code
        title: 关系编码
        width: 150
        position: 1
        importance: high
        sortable: true
      - key: source_bo_name
        title: 源业务对象
        width: 150
        position: 2
        importance: high
        sortable: true
        # [FIX 2026-06-13] FK 列头过滤: value_help 弹出业务对象选择, 过滤 source_bo_id
        searchable: false
        filterable: true
        filter_type: value_help
        filter_placeholder: 选择源业务对象
        api_param_key: source_bo_id
        value_help:
          source:
            type: bo
            target_bo: business_object
            value_field: id
            display_field: name
            code_field: code
          behavior:
            multiple: true
            allow_clear: true
            parameter_bindings:
              - local_field: version_id
                target_field: version_id
                required: true
      - key: source_bo_code
        title: 源业务对象编码
        width: 120
        position: 3
        importance: high
        sortable: true
        # [FIX 2026-06-13] FK 列头过滤: 按编码搜, 弹业务对象选择, 过滤 source_bo_id
        searchable: false
        filterable: true
        filter_type: value_help
        filter_placeholder: 按编码选择源业务对象
        api_param_key: source_bo_id
        value_help:
          source:
            type: bo
            target_bo: business_object
            value_field: id
            display_field: name
            code_field: code
          behavior:
            multiple: true
            allow_clear: true
            parameter_bindings:
              - local_field: version_id
                target_field: version_id
                required: true
      - key: target_bo_name
        title: 目标业务对象
        width: 150
        position: 4
        importance: high
        sortable: true
        # [FIX 2026-06-13] FK 列头过滤: value_help 弹出业务对象选择, 过滤 target_bo_id
        searchable: false
        filterable: true
        filter_type: value_help
        filter_placeholder: 选择目标业务对象
        api_param_key: target_bo_id
        value_help:
          source:
            type: bo
            target_bo: business_object
            value_field: id
            display_field: name
            code_field: code
          behavior:
            multiple: true
            allow_clear: true
            parameter_bindings:
              - local_field: version_id
                target_field: version_id
                required: true
      - key: target_bo_code
        title: 目标业务对象编码
        width: 120
        position: 5
        importance: high
        sortable: true
        # [FIX 2026-06-13] FK 列头过滤: 按编码搜, 弹业务对象选择, 过滤 target_bo_id
        searchable: false
        filterable: true
        filter_type: value_help
        filter_placeholder: 按编码选择目标业务对象
        api_param_key: target_bo_id
        value_help:
          source:
            type: bo
            target_bo: business_object
            value_field: id
            display_field: name
            code_field: code
          behavior:
            multiple: true
            allow_clear: true
            parameter_bindings:
              - local_field: version_id
                target_field: version_id
                required: true
      - key: relation_desc
        title: 描述
        width: 200
        position: 6
        importance: high
        sortable: true
      # [V1.1.4 2026-06-11] 删 effective_owner_id_display - 顶层 owner 已在 product
      - key: relation_type
        title: 关系类型
        width: 120
        position: 7
        importance: high
        sortable: true
      - key: relation_direction
        title: 方向
        width: 80
        position: 8
        importance: medium
        sortable: true
      - key: category_label
        title: 关系范围
        width: 150
        position: 9
        importance: medium
        sortable: true
        # [FIX 2026-06-10] 列头过滤: 用 select 控件 + hierarchy_scope_type 枚举
        filterable: true
        filter_type: select
        enum_type: hierarchy_scope_type
        filter_placeholder: 请选择关系范围
        # [FIX 2026-06-10] 用 category_type (单数) 作为 API 参数名 (后端已兼容)
        #   保持与 ui_view_config.filter.filters 命名一致
        api_param_key: category_type
      - key: created_at
        title: 创建时间
        width: 180
        position: 90
        importance: low
        sortable: true
      - key: updated_at
        title: 更新时间
        width: 180
        position: 91
        importance: low
        sortable: true
    selectable: true

  detail:
    facets:
      - title: 基本信息
        type: fieldGroup
        fields:
          - code
          - relation_type
          - relation_direction
          - relation_desc
      - title: 源业务对象
        type: fieldGroup
        fields:
          - source_bo_code
          - source_bo_name
          - source_domain_name
          - source_sub_domain_name
          - source_service_module_name
      - title: 目标业务对象
        type: fieldGroup
        fields:
          - target_bo_code
          - target_bo_name
          - target_domain_name
          - target_sub_domain_name
          - target_service_module_name
      - title: 分类信息
        type: fieldGroup
        fields:
          - category_label
          - domain_relation
      - title: 归属信息
        type: fieldGroup
        fields:
          - version_name
      - title: 系统信息
        type: fieldGroup
        fields:
          - created_at
          - updated_at
          - created_by
          - updated_by

  child_sections:
    - child_object: annotation
      title: 备注信息
      display: inline
      pageSize: 10
      columns:
        - key: category
          title: 分类
          width: 80
        - key: content
          title: 内容
          width: 300
        - key: created_at
          title: 创建时间
          width: 150
        - key: created_by
          title: 创建人
          width: 100
      actions:
        - key: create
          label: 添加备注
        - key: edit
          label: 编辑
        - key: delete
          label: 删除
          danger: true

  form:
    sections:
      - title: 版本信息
        fields:
          - version_id
      - title: 关系端点
        layout: row
        columns:
          - title: 源业务对象
            fields:
              - source_domain_id
              - source_sub_domain_id
              - source_service_module_id
              - source_bo_id
          - title: 目标业务对象
            fields:
              - target_domain_id
              - target_sub_domain_id
              - target_service_module_id
              - target_bo_id
      - title: 关系信息
        fields:
          - code
          - relation_type
          - relation_direction
          - relation_desc

  filter:
    layout: sidebar
    filters:
      - key: product_id
        title: 产品
        type: select
        source: product
        display_field: name
        position: 0
        required: true

      - key: version_id
        title: 版本
        type: select
        source: version
        display_field: name
        position: 1
        required: true
        filter_by: product_id

      - key: business_object
        title: 中心范围选择
        type: tree
        tree_structure: hierarchy
        tree_levels:
          - domain
          - sub_domain
          - service_module
          - business_object
        leaf_value_field: id
        show_count: true
        position: 2
        default: all
        filter_by: version_id

      - key: category_type
        title: 关系范围
        type: select
        source: enum_value
        enum_type: hierarchy_scope_type
        display_field: name
        position: 3
        default: all
        filter_by: version_id

      - key: relation_code
        title: 关系类型
        type: select
        source: enum_value
        enum_type: relation_type
        display_field: name
        position: 4
  change_notification:
    enabled: true
    events:
      - type: create
        channels: [in_app]
        track_fields: [source_code, target_code, relation_code]
        payload: [id, source_code, target_code, relation_code]
      - type: update
        channels: [in_app]
        track_fields: [relation_code, source_code, target_code]
        payload: [id, source_code, target_code, relation_code]
      - type: delete
        channels: [in_app]
        track_fields: []
        payload: [id, source_code, target_code, relation_code]

