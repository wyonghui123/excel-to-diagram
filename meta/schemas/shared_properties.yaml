hierarchy_fields:
  - id: version_id
    name: 版本
    type: integer
    db_column: version_id
    required: true
    description: 所属版本
    ui:
      widget: select
      relation: version
      display_field: version_name
    semantics:
      meaning: 关联的产品版本
      parent_key: true
      readonly_always: true
      context_field: true

  - id: version_name
    name: 版本
    type: string
    description: 所属版本名称
    storage: virtual
    ui:
      visible: true
      editable: false
    semantics:
      meaning: 关联版本的显示名称

  - id: version_code
    name: 版本编码
    type: string
    description: 所属版本编码（用于导入导出和快速输入）
    storage: virtual
    semantics:
      meaning: 版本的业务键，用于导入导出和外键解析
      business_key: false
      import_visible: true
      export_visible: true
      import_order: 3
      data_category: code
      virtual: true
    ui:
      visible: true
      editable: true
      widget: input
      fieldGroup: 层级归属
      fieldGroupPosition: 15

  - id: product_code
    name: 产品编码
    type: string
    description: 所属产品编码
    semantics:
      meaning: 产品编码，用于跨环境数据迁移
      business_key: true
      import_order: 0
      virtual: true
      export_visible: false
      import_visible: false
    ui:
      visible: false

audit_fields:
  - id: created_at
    name: 创建时间
    type: datetime
    db_column: created_at
    description: 创建时间
    semantics:
      meaning: 记录创建的时间戳
    ui:
      visible: true
      editable: false
      widget: datetime
      fieldGroup: 系统信息
      lineItem:
        position: 90
        importance: low
      i18n_key: common.field.created_at

  - id: updated_at
    name: 更新时间
    type: datetime
    db_column: updated_at
    description: 更新时间
    semantics:
      meaning: 记录最后更新的时间戳
    ui:
      visible: true
      editable: false
      widget: datetime
      fieldGroup: 系统信息
      lineItem:
        position: 91
        importance: low
      i18n_key: common.field.updated_at

  - id: created_by
    name: 创建人
    type: string
    db_column: created_by
    description: 创建人用户名
    semantics:
      meaning: 记录创建操作的用户
    ui:
      visible: true
      editable: false
      widget: input
      fieldGroup: 系统信息
      i18n_key: common.field.created_by

  - id: updated_by
    name: 更新人
    type: string
    db_column: updated_by
    description: 更新人用户名
    semantics:
      meaning: 记录最后更新操作的用户
    ui:
      visible: true
      editable: false
      widget: input
      fieldGroup: 系统信息
      i18n_key: common.field.updated_by

owner_fields:
  - id: owner_id
    name: 负责人
    type: integer
    db_column: owner_id
    description: 负责人ID
    semantics:
      meaning: 负责人，关联用户表
    ui:
      visible: true
      editable: true
      widget: select
      relation: user
      display_field: display_name
      fieldGroup: 系统信息
      i18n_key: common.field.owner_id

naming_fields:
  - id: code
    name: 编码
    type: string
    db_column: code
    description: 编码
    semantics:
      meaning: 唯一编码
      business_key: true
      immutable: true
      pattern: "^[A-Z][A-Z0-9_]*$"
      data_category: code
      import_visible: true
      export_visible: true
      import_order: 2
    ui:
      visible: true
      editable: true
      widget: input
      fieldGroup: 基本信息
      fieldGroupPosition: 10

  - id: name
    name: 名称
    type: string
    db_column: name
    description: 名称
    semantics:
      meaning: 显示名称
      display_name: true
      data_category: text
      import_visible: true
      export_visible: true
      import_order: 20
    ui:
      visible: true
      editable: true
      widget: input
      fieldGroup: 基本信息
      fieldGroupPosition: 20
      lineItem:
        position: 1
        importance: high
