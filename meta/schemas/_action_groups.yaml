# 动作分组定义 — 权限矩阵 UI 的业务级动作分组
# 定义 view/edit/manage 到 CRUD 动作的映射，以及独立动作列表
# 前端和后端共享此配置
# BO 可在自身 YAML 中声明 action_groups 覆盖默认配置

action_groups:
  view:
    id: view
    label: 查看
    actions: [read, list]
    level: 1
    description: 查看和列表权限

  edit:
    id: edit
    label: 编辑
    actions: [read, list, create, update]
    level: 2
    includes: [view]
    description: 包含查看，可创建和修改

  manage:
    id: manage
    label: 管理
    actions: [read, list, create, update, delete]
    level: 3
    includes: [edit]
    description: 包含编辑，可删除

# 独立动作：不归入任何分组，作为独立权限展示
# 这些动作在 UI 上作为独立切换按钮，与 view/edit/manage 并列
# BO 级覆盖可将独立动作归入分组（如 user_group 的 assign 归入 edit）
standalone_actions:
  - id: export
    label: 导出
    description: 独立权限，不隐含 read
  - id: import
    label: 导入
    description: 独立权限，不隐含 create
  - id: assign
    label: 分配
    description: 关联操作（成员管理），独立于 edit
  - id: unassign
    label: 取消分配
    description: 关联操作（成员管理），独立于 edit
  - id: associate
    label: 关联
    description: 关联操作（关系建立），独立于 edit
  - id: dissociate
    label: 取消关联
    description: 关联操作（关系解除），独立于 edit
  - id: grant
    label: 授权
    description: 关联操作（权限授予），独立于 edit
  - id: revoke
    label: 撤销
    description: 关联操作（权限撤销），独立于 edit
