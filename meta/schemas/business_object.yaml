id: business_object
name: 业务对象
table_name: business_objects
description: 业务对象是领域模型的核心实体，代表业务领域中的重要的事物或概念。业务对象之间可以有各种关系。
display_name_field: name
parent_object: service_module
aspects:
- hierarchy_aspect
- audit_aspect
- naming_aspect
dimension_bindings:
- dimension: business_object
  field: id
- dimension: service_module
  field: service_module_id
- dimension: sub_domain
  field: service_module_id
  through: service_module
- dimension: domain
  field: service_module_id
  through: service_module->sub_domain
- dimension: version
  field: service_module_id
  through: service_module->sub_domain->domain
- dimension: product
  field: service_module_id
  through: service_module->sub_domain->domain->version
audit:
  enabled: true
  create:
    enabled: true
    fields: all
  update:
    enabled: true
    fields: changed_only
    exclude:
    - id
    - created_at
    - updated_at
    - created_by
    - updated_by
  delete:
    enabled: true
    fields: business_only
    exclude:
    - id
    - created_at
    - updated_at
    - created_by
    - updated_by
deletability:
  condition: self.relation_count == 0
  message: 存在关联关系的业务对象不能删除
authorization:
  check: true
  scope: service_module_id IN (SELECT sm.id FROM service_modules sm JOIN sub_domains
    sd ON sm.sub_domain_id = sd.id JOIN domains d ON sd.domain_id = d.id JOIN versions
    v ON d.version_id = v.id JOIN products p ON v.product_id = p.id WHERE p.visibility
    = 'public' OR p.owner_id = $user.id)
  auto_owner: false
  auto_permission: admin
  inherit_to_children: true
  allow_transfer: false
  transfer_keep_permissions: false
hierarchy:
  enabled: true
  hierarchy_id: biz_hierarchy
  level: 5
  parent_field: service_module_id
  path_field: hierarchy_path
  depth_field: hierarchy_depth
context:
  field: version_id
  description: 版本上下文，所有查询自动注入 version_id 过滤
cascade_select:
- field: domain_id
  parent_object: domain
  parent_display_field: name
  filter_by: version_id
- field: sub_domain_id
  parent_object: sub_domain
  parent_display_field: name
  filter_by: domain_id
- field: service_module_id
  parent_object: service_module
  parent_display_field: name
  filter_by: sub_domain_id
semantics:
  meaning: 领域模型的核心实体
  business_key: true
  display_name: true
  category: core_entity
  hierarchy_level: 6
  aliases:
  - 业务对象
  - BusinessObject
  - BO
  custom:
    color_coding: businessobject
    icon: bo
key_template:
  enabled: true
  user_editable: auto_or_manual
  auto_suggest: true
  pattern: '{service_module_code}{SEQ:2}'
  segments:
  - type: parent_field
    source: service_module_code
    transform: upper
  - type: sequence
    name: bo_code_seq
    scope: service_module_code
    auto_detect: true
    padding: 2
    start: 1
  preview: PUM01
import_export:
  import_enabled: true
  export_enabled: true
  cascade_export: false
  cascade_import: false
  conflict_strategy: upsert
  conflict_key: code
  description_for_agent: 业务对象是领域模型的核心实体，代表业务领域中的重要的事物或概念。业务对象之间可以有各种关系。
analytical_model:
  enabled: true
  fact:
    table: business_objects
    alias: bo
    measures:
    - id: bo_count
      field: id
      aggregation: count
      display_name: 业务对象数量
      format: '#,##0'
  dimensions:
  - id: version_id
    field: bo.version_id
    display_name: 版本
    hierarchy_level: 1
  - id: domain_id
    field: d.id
    display_name: 领域
    hierarchy_level: 2
    join_path:
    - table: service_modules sm
      from: service_module_id
      to: id
    - table: sub_domains sd
      from: sub_domain_id
      to: id
    - table: domains d
      from: domain_id
      to: id
  - id: sub_domain_id
    field: sd.id
    display_name: 子领域
    hierarchy_level: 3
    join_path:
    - table: service_modules sm
      from: service_module_id
      to: id
    - table: sub_domains sd
      from: sub_domain_id
      to: id
  - id: service_module_id
    field: bo.service_module_id
    display_name: 服务模块
    hierarchy_level: 4
  cross_table_filters:
  - id: annotation_category
    display_name: 备注类型
    description: 按备注类型过滤包含该类型备注的业务对象
    association:
      target_table: annotations
      target_alias: a
      join_type: exists
      on_conditions:
      - left_field: bo.id
        operator: eq
        right_field: a.target_id
      - left_field: '''business_object'''
        operator: eq
        right_field: a.target_type
      where_conditions:
      - field: a.category
        operator: in
        parameter: annotation_category
    ui:
      filter_type: multi-select
      filter_label: 备注类型
      filter_placeholder: 请选择备注类型
      options_source: enum
      enum_type: annotation_category
      position: 50
  - id: annotation_content_search
    display_name: 备注内容
    description: 按备注内容模糊搜索业务对象
    association:
      target_table: annotations
      target_alias: a
      join_type: exists
      on_conditions:
      - left_field: bo.id
        operator: eq
        right_field: a.target_id
      - left_field: '''business_object'''
        operator: eq
        right_field: a.target_type
      where_conditions:
      - field: a.content
        operator: like
        parameter: annotation_content_search
    ui:
      filter_type: search
      filter_label: 备注内容
      filter_placeholder: 输入备注内容关键词...
      position: 51
  aggregates:
  - id: version_bo_stats
    name: 版本业务对象统计
    type: materialized
    dimensions:
    - version_id
    - domain_id
    measures:
    - bo_count
    refresh: on_change
    storage:
      table: agg_version_bo_stats
      cache_ttl: 300
ui_view_config:
  skip_auto_menu: true
  filter:
    layout: sidebar
    filters:
    - key: version_id
      title: 版本
      type: select
      source: version
      display_field: name
      position: 0
      required: true
    - key: domain_id
      title: 领域
      type: select
      source: domain
      display_field: name
      position: 1
      filter_by: version_id
    - key: description
      title: 描述搜索
      type: text
      placeholder: 搜索描述内容...
      position: 100
  list:
    pageSize: 20
    searchFields:
    - name
    - code
    - description
    columns:
    - key: name
      title: 名称
      width: 200
      position: 1
      importance: high
      sortable: true
      i18n_key: bo.field.name
    - key: code
      title: 编码
      width: 150
      position: 2
      importance: high
      sortable: true
      i18n_key: bo.field.code
    - key: service_module_name
      title: 服务模块
      width: 150
      position: 10
      importance: high
      sortable: true
      searchable: false
      filterable: true
      filter_type: value_help
      filter_placeholder: 选择服务模块
      api_param_key: service_module_id
      i18n_key: bo.field.service_module_name
      value_help:
        source:
          type: bo
          target_bo: service_module
          value_field: id
          display_field: name
          code_field: code
        behavior:
          multiple: true
          allow_clear: true
          parameter_bindings:
          - local_field: version_id
            target_field: version_id
            required: true
    - key: sub_domain_name
      title: 子领域
      width: 120
      position: 11
      importance: medium
      sortable: true
      searchable: false
      filterable: true
      filter_type: value_help
      filter_placeholder: 选择子领域
      api_param_key: sub_domain_id
      i18n_key: bo.field.sub_domain_name
      value_help:
        source:
          type: bo
          target_bo: sub_domain
          value_field: id
          display_field: name
          code_field: code
        behavior:
          multiple: true
          allow_clear: true
          parameter_bindings:
          - local_field: version_id
            target_field: version_id
            required: true
    - key: domain_name
      title: 领域
      width: 120
      position: 12
      importance: medium
      sortable: true
      searchable: false
      filterable: true
      filter_type: value_help
      filter_placeholder: 选择领域
      api_param_key: domain_id
      i18n_key: bo.field.domain_name
      value_help:
        source:
          type: bo
          target_bo: domain
          value_field: id
          display_field: name
          code_field: code
        behavior:
          multiple: true
          allow_clear: true
          parameter_bindings:
          - local_field: version_id
            target_field: version_id
            required: true
    - key: version_name
      title: 所属版本
      width: 150
      position: 13
      importance: high
      sortable: true
    - key: relation_count
      title: 关系数量
      width: 100
      position: 80
      importance: medium
      sortable: true
      computed: true
      computation:
        type: count_relations
        scope: self
    - key: created_at
      title: 创建时间
      width: 180
      position: 90
      importance: low
      sortable: true
      i18n_key: common.field.created_at
    - key: updated_at
      title: 更新时间
      width: 180
      position: 91
      importance: low
      sortable: true
      i18n_key: common.field.updated_at
    selectable: true
  detail:
    facets:
    - title: 基本信息
      type: fieldGroup
      fields:
      - name
      - description
      - version_id
      - service_module_id
      - code
      - sub_domain_name
      - domain_name
    - title: 对象关系
      type: association
      association: relationships
      readonly: true
      pageSize: 20
      customFetcher: merged_bo_relationships
    - title: 系统信息
      type: fieldGroup
      fields:
      - created_at
      - updated_at
      - created_by
      - updated_by
    showChangeHistory: true
    showRelations: true
  child_sections:
  - child_object: annotation
    title: 备注信息
    display: expandable
    pageSize: 10
    columns:
    - key: category
      title: 分类
      width: 80
    - key: content
      title: 内容
      width: 300
    - key: created_at
      title: 创建时间
      width: 150
    - key: created_by
      title: 创建人
      width: 100
    actions:
    - key: create
      label: 添加备注
    defaultSort:
      field: created_at
      order: desc
  form:
    sections:
    - title: 基本信息
      fields:
      - name
      - description
      - version_id
      - domain_id
      - sub_domain_id
      - service_module_id
      - code
    layout: vertical
  change_notification:
    enabled: true
    events:
    - type: create
      channels:
      - in_app
      track_fields:
      - code
      - name
      - service_module_id
      payload:
      - id
      - code
      - name
    - type: update
      channels:
      - in_app
      track_fields:
      - code
      - name
      - description
      payload:
      - id
      - code
      - name
    - type: delete
      channels:
      - in_app
      track_fields: []
      payload:
      - id
      - code
      - name
fields:
- id: version_code
  name: 版本编码
  type: string
  description: 所属版本编码
  storage: virtual
  semantics:
    meaning: 版本编码，用于跨环境数据迁移
    business_key: true
    import_order: 1
    virtual: true
    export_visible: false
    import_visible: false
  ui:
    visible: false
- id: service_module_code
  name: 服务模块编码
  type: string
  description: 所属服务模块编码（用于导入导出和快速输入）
  storage: virtual
  semantics:
    meaning: 服务模块的业务键，用于导入导出和外键解析
    business_key: false
    import_visible: true
    export_visible: true
    import_order: 3
    data_category: code
    virtual: true
  ui:
    visible: true
    editable: true
    widget: input
    fieldGroup: 层级归属
    fieldGroupPosition: 45
    i18n_key: bo.field.service_module_code
- id: id
  name: ID
  type: integer
  db_column: id
  required: true
  unique: true
  description: 技术主键
  ui:
    visible: false
    editable: false
  semantics:
    meaning: 自增主键，系统内部使用
    import_order: 999
    analytics:
      category: measure
      aggregation: count
      display_name: 业务对象数量
- id: version_id
  name: 版本
  type: integer
  db_column: version_id
  required: true
  description: 所属版本（用于筛选）
  ui:
    widget: select
    relation: version
    display_field: version_name
    cascade_group: hierarchy
    cascade_level: 1
  semantics:
    meaning: 关联的产品版本（用于筛选）
    readonly_always: true
    context_field: true
    analytics:
      category: dimension
      type: foreign_key
      display_name: 版本
    import_order: 999
  value_help:
    source:
      type: bo
      target_bo: version
      value_field: id
      display_field: name
      code_field: code
      apply_target_permissions: false
    behavior:
      validation: true
      binding_strength: strict
    presentation:
      result_type: dropdown
      display_format: '{code} - {name}'
      columns:
      - field: code
        label: 编码
        width: 120
      - field: name
        label: 名称
        width: 200
- id: domain_id
  name: 领域
  type: integer
  description: 所属领域（用于级联筛选，新建后不可变更，由 DB trigger 自动从 service_module_id 推导并维护）
  storage: stored
  db_column: domain_id
  editable: true
  ui:
    widget: select
    relation: domain
    display_field: domain_name
    depends_on: version_id
    cascade_group: hierarchy
    cascade_level: 2
  semantics:
    meaning: 用于级联筛选子领域（由 trigger 维护）
    immutable: true
    redundancy:
      type: stored
      source_field: service_module_id
      derived_from: domain.id
      maintained_by: db_trigger
      join_path:
      - table: service_modules
        from: service_module_id
        to: id
        select: sub_domain_id
      - table: sub_domains
        from: sub_domain_id
        to: id
        select: domain_id
    import_order: 999
  value_help:
    source:
      type: bo
      target_bo: domain
      value_field: id
      display_field: name
      code_field: code
      apply_target_permissions: true
      write_scope_policy: enforce
    behavior:
      validation: true
      binding_strength: strict
      parameter_bindings:
      - local_field: version_id
        target_field: version_id
        required: true
    presentation:
      result_type: dropdown
      display_format: '{code} - {name}'
      columns:
      - field: code
        label: 编码
        width: 120
      - field: name
        label: 名称
        width: 200
- id: sub_domain_id
  name: 子领域
  type: integer
  description: 所属子领域（用于级联筛选，新建后不可变更，由 DB trigger 自动从 service_module_id 推导并维护）
  storage: stored
  db_column: sub_domain_id
  editable: true
  ui:
    widget: select
    relation: sub_domain
    display_field: sub_domain_name
    depends_on: domain_id
    cascade_group: hierarchy
    cascade_level: 3
  semantics:
    meaning: 用于级联筛选服务模块（由 trigger 维护）
    immutable: true
    redundancy:
      type: stored
      source_field: service_module_id
      derived_from: sub_domain.id
      maintained_by: db_trigger
      join_path:
      - table: service_modules
        from: service_module_id
        to: id
        select: sub_domain_id
    import_order: 999
  value_help:
    source:
      type: bo
      target_bo: sub_domain
      value_field: id
      display_field: name
      code_field: code
      apply_target_permissions: true
      write_scope_policy: inherit
      scope_inherit_from: domain_id
    behavior:
      validation: true
      binding_strength: strict
      parameter_bindings:
      - local_field: domain_id
        target_field: domain_id
        required: true
    presentation:
      result_type: dropdown
      display_format: '{code} - {name}'
      columns:
      - field: code
        label: 编码
        width: 120
      - field: name
        label: 名称
        width: 200
- id: service_module_id
  name: 服务模块
  type: integer
  db_column: service_module_id
  required: false
  description: 所属服务模块（创建后不可变更）
  ui:
    widget: select
    relation: service_module
    display_field: service_module_name
    depends_on: sub_domain_id
    cascade_group: hierarchy
    cascade_level: 4
  semantics:
    meaning: 关联的服务模块（父对象）
    parent_key: true
    immutable: true
    resolve_from_field: service_module_code
    resolve_to_object: service_module
    mandatory: false
    parent_key_template_editable: always
    analytics:
      category: dimension
      type: foreign_key
      display_name: 服务模块
    import_order: 999
  value_help:
    source:
      type: bo
      target_bo: service_module
      value_field: id
      display_field: name
      code_field: code
      apply_target_permissions: true
      write_scope_policy: inherit
      scope_inherit_from: sub_domain_id
    behavior:
      validation: true
      binding_strength: strict
      parameter_bindings:
      - local_field: sub_domain_id
        target_field: sub_domain_id
        required: true
    presentation:
      result_type: dropdown
      display_format: '{code} - {name}'
      columns:
      - field: code
        label: 编码
        width: 120
      - field: name
        label: 名称
        width: 200
- id: code
  name: 编码
  type: string
  db_column: code
  required: true
  description: 业务对象编码
  semantics:
    meaning: 业务对象的唯一编码
    business_key: true
    immutable: true
    pattern: ^[A-Z][A-Z0-9_]*$
    examples:
    - BO_ORDER
    - BO_USER
    - BO_PRODUCT
    data_category: code
    import_visible: true
    export_visible: true
    import_order: 2
- id: name
  name: 名称
  type: string
  db_column: name
  required: true
  description: 业务对象名称
  semantics:
    meaning: 业务对象的显示名称
    display_name: true
    data_category: text
    import_visible: true
    export_visible: true
    import_order: 20
    examples:
    - 订单
    - 用户
    - 产品
- id: description
  name: 描述
  type: text
  db_column: description
  description: 业务对象描述
  ui:
    widget: textarea
    render_hints:
      searchable: true
  semantics:
    meaning: 业务对象的详细描述
    data_category: text
    import_visible: true
    export_visible: true
    import_order: 30
- id: domain_name
  name: 领域
  type: string
  description: 所属领域名称
  storage: virtual
  ui:
    visible: true
    editable: false
  semantics:
    meaning: 关联领域的显示名称
    import_order: 95
    redundancy:
      type: virtual
      source_field: service_module_id
      derived_from: domain.name
      join_path:
      - table: service_modules
        from: service_module_id
        to: id
        select: sub_domain_id
      - table: sub_domains
        from: sub_domain_id
        to: id
        select: domain_id
      - table: domains
        from: domain_id
        to: id
        select: name
- id: sub_domain_name
  name: 子领域
  type: string
  description: 所属子领域名称
  storage: virtual
  ui:
    visible: true
    editable: false
  semantics:
    meaning: 关联子领域的显示名称
    import_order: 95
    redundancy:
      type: virtual
      source_field: service_module_id
      derived_from: sub_domain.name
      join_path:
      - table: service_modules
        from: service_module_id
        to: id
        select: sub_domain_id
      - table: sub_domains
        from: sub_domain_id
        to: id
        select: name
- id: service_module_name
  name: 服务模块
  type: string
  description: 所属服务模块名称
  storage: virtual
  ui:
    visible: true
    editable: false
  semantics:
    meaning: 关联服务模块的显示名称
    import_order: 95
    redundancy:
      type: virtual
      source_field: service_module_id
      derived_from: service_module.name
      join_path:
      - table: service_modules
        from: service_module_id
        to: id
        select: name
- id: version_name
  name: 版本
  type: string
  description: 所属版本名称
  storage: virtual
  ui:
    visible: true
    editable: false
  semantics:
    meaning: 关联版本的显示名称
    redundancy:
      type: virtual
      source_field: version_id
      derived_from: version.name
      join_path:
      - table: versions
        from: version_id
        to: id
        select: name
    import_order: 95
- id: relation_count
  name: 关系数量
  type: integer
  description: 业务对象的关系数量
  storage: virtual
  computed: true
  semantics:
    meaning: 业务对象的关系数量统计
    analytics:
      category: measure
      aggregation: count
    import_order: 95
  computation:
    type: count_relations
    scope: self
relations:
- id: bo_to_version
  name: 归属版本
  type: parent_child
  target: version
  cardinality: N:1
  description: 业务对象归属的版本
  semantics:
    meaning: 业务对象与版本的层级关系
- id: bo_to_service_module
  name: 归属服务模块
  type: parent_child
  target: service_module
  cardinality: N:1
  description: 业务对象归属的服务模块
  semantics:
    meaning: 业务对象与服务模块的层级关系
- id: bo_to_source_relationships
  name: 作为源的关系
  type: reference
  target: relationship
  cardinality: 1:N
  description: 业务对象作为源的关系
  semantics:
    meaning: 业务对象作为源的关系列表
- id: bo_to_target_relationships
  name: 作为目标的关系
  type: reference
  target: relationship
  cardinality: 1:N
  description: 业务对象作为目标的关系
  semantics:
    meaning: 业务对象作为目标的关系列表
associations:
- name: relationships
  label: 对象关系
  target_type: relationship
  type: merged_one_to_many
  foreign_key_source: source_bo_id
  foreign_key_target: target_bo_id
  readonly: true
  display:
    label: 对象关系
    plural_label: 对象关系列表
    columns:
    - id: relation_type_name
      label: 关系类型
    - id: source_bo_name
      label: 源对象
    - id: target_bo_name
      label: 目标对象
    - id: relation_desc
      label: 关系描述
  customFetcher: merged_bo_relationships
actions:
- id: business_object_create
  name: 创建业务对象
  type: crud
  method: POST
  path: /api/v1/business_objects
  description: 创建新的业务对象
- id: business_object_read
  name: 查询业务对象
  type: crud
  method: GET
  path: /api/v1/business_objects/{id}
  description: 查询单个业务对象
- id: business_object_update
  name: 更新业务对象
  type: crud
  method: PUT
  path: /api/v1/business_objects/{id}
  description: 更新业务对象信息
- id: business_object_delete
  name: 删除业务对象
  type: crud
  method: DELETE
  path: /api/v1/business_objects/{id}
  description: 删除业务对象
- id: business_object_list
  name: 列表查询
  type: crud
  method: GET
  path: /api/v1/business_objects
  description: 查询业务对象列表
- id: batch_import
  name: 批量导入
  type: business
  method: POST
  path: /api/v1/business_objects/import
  description: 从Excel批量导入业务对象
- id: export
  name: 导出
  type: business
  method: GET
  path: /api/v1/business_objects/export
  description: 导出业务对象到Excel
indexes:
- name: uidx_business_objects_version_code
  fields:
  - version_id
  - code
  type: unique
  priority: high
  description: 版本+编码唯一索引（业务键约束，SAP @ObjectModel.businessKey）
- name: idx_business_objects_version_service_module
  fields:
  - version_id
  - service_module_id
  type: composite
  priority: high
  description: 版本+服务模块复合索引（层级筛选高频路径）
- name: idx_business_objects_version_name
  fields:
  - version_id
  - name
  type: btree
  priority: medium
  description: 版本+名称索引（名称搜索场景）
validations:
- id: version_id_required
  name: 版本ID必填
  type: field
  rule: version_id is not None
  message: 版本ID不能为空
  severity: error
- id: code_format
  name: 编码格式
  type: field
  rule: code matches '^[A-Z][A-Z0-9_]*$'
  message: 编码格式不正确，应为大写字母开头
  severity: warning
conditional_required_examples:
- field_id: sub_domain_id
  description: 领域-子领域条件必填示例
  constraints:
  - type: conditional_required
    condition: params.get('domain_id') is not None
    message: 选择领域后，子领域必填
    severity: error
  - type: conditional_required
    condition: params.get('domain_id') == 1
    message: 选择核心域领域时，子领域必填
    severity: warning
audit_levels:
- name: create
  level: INFO
  category: operation
- name: update
  level: INFO
  category: operation
- name: delete
  level: WARN
  category: destructive
routes:
  detail: /detail/business_object/business_object-detail
  list: /business_object-management
list:
  pagination:
    default_page_size: 20
    page_size_options:
    - 10
    - 20
    - 50
    - 100
nested:
  enabled: true
  parent: service_module
  children: []
persistence:
  strategy: audit_log
  survive_reload: true
