  - admin 用户已登录
  - 至少 1 个产品存在
  - 当前用户具有产品管理权限 (BR-product-AUTH)

# ==== 业务原子动作(非 UI 操作) ====
tasks:
  - id: T_PRD_VER_001
    title: 创建产品(应用 auto_owner)
    class: CreateProductWithOwner
    params:
      name: 测试产品
      visibility: public
    priority: P0
  - id: T_PRD_VER_002
    title: 为该产品创建版本
    class: CreateVersionForProduct
    params:
      name: V1.0
      productId: PROD_001
    priority: P0
  - id: T_PRD_VER_003
    title: 尝试删除有版本的产品(应失败 - deletability 业务规则)
    class: AttemptDeleteProduct
    params:
      productCode: PROD_001
    priority: P0
  - id: T_PRD_VER_004
    title: 删除无版本的产品(应成功)
    class: DeleteProductSafely
    params:
      productCode: PROD_002
    priority: P1

# ==== 业务断言(非 DOM 断言) ====
questions:
