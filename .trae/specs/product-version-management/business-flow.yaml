    description: 存在版本的产品不能删除
    expected: false
    context:
      relationCount: 1
  - ruleId: BR-product-AUTH
    description: 产品访问权限校验
    expected: true
    context:
      authorized: true
  - ruleId: BR-product-AUDIT
