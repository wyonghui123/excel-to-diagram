schema: business_object
name: 业务对象
total_rules: 25
rules:
- id: BR-business_object-DEL
  type: deletability
  object: business_object
  condition: self.relation_count == 0
  message: 存在关联关系的业务对象不能删除
  source: schema:business_object.yaml:deletability
  derived_scenarios:
  - id: T_BUSINESS_OBJECT_DEL_001
    title: 有依赖时删除应失败
    priority: P0
    expected_deletable: false
    assertion: 'BusinessRuleAssertor.assertRule(''BR-business_object-DEL'', { relationCount:
      1, expected: false })'
  - id: T_BUSINESS_OBJECT_DEL_002
    title: 无依赖时删除应成功
    priority: P1
    expected_deletable: true
    assertion: 'BusinessRuleAssertor.assertRule(''BR-business_object-DEL'', { relationCount:
      0, expected: true })'
- id: BR-business_object-AUTH-check
  type: authorization
  object: business_object
  subtype: check
  scope: service_module_id IN (SELECT sm.id FROM service_modules sm JOIN sub_domains
    sd ON sm.sub_domain_id = sd.id JOIN domains d ON sd.domain_id = d.id JOIN versions
    v ON d.version_id = v.id JOIN products p ON v.product_id = p.id WHERE p.visibility
    = 'public' OR p.owner_id = $user.id)
  source: schema:business_object.yaml:authorization.check
  derived_scenarios:
  - id: T_BUSINESS_OBJECT_AUTH_001
    title: 未授权访问应拒绝
    priority: P0
    expected: false
    assertion: 'BusinessRuleAssertor.assertRule(''BR-business_object-AUTH-check'',
      { authorized: false, expected: 403 })'
  - id: T_BUSINESS_OBJECT_AUTH_002
    title: 已授权访问应成功
    priority: P1
    expected: true
    assertion: 'BusinessRuleAssertor.assertRule(''BR-business_object-AUTH-check'',
      { authorized: true, expected: 200 })'
