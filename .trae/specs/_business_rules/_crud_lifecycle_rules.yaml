# ============================================================
  # UI-COLOR-1: Excel 模板配色规范 (BMRD 2026-06-14 v3 业务化重写)
  # 背景:
  #   v1: 浅蓝色(SECTION) / 浅蓝灰(AUTO) 蓝系混淆
  #   v2: 调整为 4 色色相区分 (深蓝/黄/蓝灰/绿)
  #   v2.1: 移除"新增操作行"色块, 分区标题描述精简, 去 v1.1
  #   v2.2: parent_key 描述修正 + 扩展 FK 编码显示字段
  #   v3 (本版本):
  #     - 移除"深蓝色 分区标题"图例项 (用户反馈: 深蓝色只在说明页用, 数据列无)
  #     - 业务化重写所有列头 comment 和说明页文字, 面向业务用户
  #     - 去掉 【】、底色:xxx、新增必填、编辑时只读、与 yaml 规则一致 等技术话术
  #     - "派生自 xxx" → "xxx的编码(自动带出, 无需填写)"
  #     - 添加 _friendly_field_name() 辅助: target_bo_id → 目标业务对象
  # ============================================================
  - id: UI-COLOR-1
    name: Excel 模板配色规范 (v3 业务化重写)
    priority: P1
    status: ACTIVE
    last_updated: '2026-06-14'
    description: |
      Excel 导出模板的颜色必须满足"色相级别可区分"原则，
      不允许仅靠亮度差异区分语义，且每种颜色必须有明确的语义。
    color_scheme:
      section_title:
        fill: '#1565C0'         # PRIMARY_COLOR 深蓝底
        font_color: '#FFFFFF'   # 白色加粗
        usage: 区段分组标识（如"操作说明"/"自动编码规则"等分区标题）
      required:
        fill: '#FFF2CC'         # WARNING_LIGHT 浅黄
        usage: 业务关键字（code 字段），新增必填，编辑时只读
      auto_or_manual_code:
        fill: '#E1F5FE'         # INFO_LIGHT 浅蓝灰
        usage: 自动/可手动编码字段，留空由系统生成
      business_key_parent:
        fill: '#E6F7E6'         # SUCCESS_LIGHT 浅绿
        usage: 父对象编码 + 父对象 FK 编码显示字段 (如 source_bo_code/target_bo_code)
      readonly:
        fill: '#E0E0E0'         # GRAY_300 灰色
        usage: 只读字段（系统字段 / readonly_always / immutable / 计算字段）
    design_principles:
      - 4 色色相 = 黄/蓝灰/绿/灰，肉眼可辨 (去掉了深蓝色)
      - 分区标题去掉深蓝色: 数据列不再使用深蓝色, 颜色都用于表示字段控制
      - 同色相规则: 同一种颜色 = 同一种语义，不能跨语义复用
      - 不冗余原则: 已有文字/位置表达时，不重复使用颜色
      - 父对象编码家族: 父对象外键 + 父对象 FK 编码显示字段 都用浅绿 (语义同源)
      - 业务用户友好: 避免【】、底色:xxx、新增必填、编辑时只读、与 yaml 规则一致 等术语
    removed_in_v21:
      - CREATE_NEW_FILL (新增操作行底色): 操作模式 'create - 新增' 文字 + 底部空白位置已足够, 颜色冗余
      - v1.1 版本号标注: 内部 spec 版本, 对用户无意义
      - 深蓝底白字重复描述: 图例 label '深蓝色 分区标题' 已表达, 不需再次解释
    removed_in_v3:
      - removed_1: '深蓝色分区标题图例项 - 整体移除, 用户反馈深蓝色只用于说明页'
      - removed_2: '【业务关键字】等SAP风格标记 - 改为业务化口语'
      - removed_3: '底色浅黄等技术说明 - 颜色信息属于图例, 不重复出现在 comment'
      - removed_4: '与yaml规则一致等内部术语 - 用户不关心 yaml, 只关心能否修改'
      - removed_5: '派生自target_bo_id - 改为 目标业务对象的编码(自动带出, 无需填写)'
    new_terminology:
      business_key: 业务编码
      parent_key: 父对象编码
      readonly_desc: 系统字段自动维护无需填写
      auto_or_manual_desc: 留空由系统自动生成填写则使用填入值
    comment_examples_v3:
      business_key: 业务编码必填每行唯一标识
      parent_key: 父对象编码必填关联到上级对象编辑时不可变更
      auto_or_manual: 业务编码必填留空由系统自动生成
      fk_display: 源业务对象的编码自动带出无需填写
    changed_in_v22:
      - "parent_key 描述: 编辑时可切换 改为 编辑时不可变更 (与 yaml 规则一致)"
      - "扩展到 FK 编码显示字段: parent_key 描述范围扩展到 source_bo_code/target_bo_code 等 FK 冗余显示字段"
      - "新增 fk_display_code 分类: _classify_field 中新增, 配 BUSINESS_KEY_FILL (浅绿)"
      - "字段顺序调整: export sort 新增 parent_key_display 排序键, 让 FK 编码显示字段紧跟对应 FK id"
      - "表头 comment 增强: 颜色/规则说明移到每个表头 cell.comment (鼠标悬停可见), 图例简化为颜色汇总表"
      - "相关字段: source_bo_code/target_bo_code 显式标 parent_key_display: true"
    critical_bugfix_v22:
      - id: BUG-PARENT-KEY-DISPLAY-LOADER
        title: "parent_key_display 字段未在 YAML loader 中加载"
        date: '2026-06-14'
        severity: HIGH
        discovered: 用户反馈 source_bo_code/target_bo_code 颜色/顺序未变化
        root_cause: |
          yaml_loader.py L290-L304 没有读取 semantics.parent_key_display 字段,
          models_annotations.py FieldSemantics dataclass 也未定义该字段.
          即使在 YAML 中标注 parent_key_display: true, 加载后 get_meta_object 返回的对象中
          semantics.parent_key_display 永远是 False.
        fix:
          - "models_annotations.py FieldSemantics 新增 parent_key_display: bool = False"
          - "yaml_loader.py L304 新增 parent_key_display=data.get('parent_key_display', False)"
        verification: |
          重启服务后, source_bo_code/target_bo_code 的 semantics.parent_key_display = True,
          排序后顺序: source_bo_id(15), target_bo_id(16), source_bo_code(17), target_bo_code(18)
        lesson_learned: "新增字段时必须同步更新 dataclass 定义 + YAML loader + YAML schema + BMRD spec, 缺一不可"
      - id: BUG-FK-DISPLAY-CODE-MAIN-PATH
        title: "主导出块 L775-793 漏掉 fk_display_code 检查, 现有数据行变灰色"
        date: '2026-06-14'
        severity: HIGH
        discovered: |
          用户第二轮反馈: source_bo_code/target_bo_code 还是灰色
          (前一轮已修 loader bug, 但数据行颜色仍不对)
        root_cause: |
          主导出有 5 个数据写入块, 之前只更新了其中 4 个 (空行/新增行/带 op mode 路径):
          - L524-526: 空行 (no op mode) - 有 fk_display_code 检查 ✓
          - L779-783: 现有数据行 (no op mode) - 漏掉 ✗
          - L855-857: 空行 (with op mode) - 有 ✓
          - L1138-1141: 现有数据行 (with op mode) - 有 ✓
          - L1221-1224: 空行 (with op mode) - 有 ✓

          L779 的现有数据行分支没有 fk_display_code 检查,
          导致 source_bo_code/target_bo_code 走 readonly 分支变灰色.
        fix:
          - "import_export_service.py L779-783 新增 elif actual_col_idx in fk_display_code_columns 分支"
        verification: |
          模拟主数据写入逻辑:
          - 源业务对象编码 (idx=6) -> fk_display_code (浅绿) ✓
          - 目标业务对象编码 (idx=7) -> fk_display_code (浅绿) ✓
        lesson_learned: |
          "新增颜色分类时, 必须枚举所有数据写入块 (主导出 + 子表写入) 并逐一添加分支.
          grep '_apply_classification_fill' 的命中数应等于分类数 × 块数."
      - id: BUG-SECOND-PATH-FIX-REMINDER
        title: "5 处数据写入块必须保持一致性 (防御性编程提醒)"
        date: '2026-06-14'
        severity: INFO
        note: |
          import_export_service.py 共有 5 处数据写入块:
          1. 主导出 (no op mode) - 数据行
          2. 主导出 (no op mode) - 空行
          3. 主导出 (with op mode) - 数据行
          4. 主导出 (with op mode) - 空行
          5. 子表 (_write_child_sheet) - _classify_field 走 _apply_classification_fill
          6. 导出层 (description_generator) - description_generator 写值
          添加新颜色分类 (如 fk_display_code) 必须检查所有 5 处.
          推荐封装一个统一的 _apply_classification_fill_with_protection() helper, 收口 5 处逻辑.
      - id: BUG-COLUMN-ORDER-CATEGORY-LABEL
        title: "关系范围列位置优化: 紧跟关系方向"
        date: '2026-06-15'
        severity: LOW
        discovered: |
          用户反馈: 关系 sheet 中的"关系范围"列(对应 category_label 字段)位置在最后,
          跟"关系类型""关系方向"等类型相关列分隔太远, 阅读不连贯.
        fix:
          - "relationship.yaml category_label.semantics.import_order = 7.5"
          - "位置: 关系方向 (7) 之后, 目标领域 (8) 之前"
          - "用户在虚拟字段区域内, 紧跟源服务模块 (7), 然后才是目标层级字段"
          - "使用 float (7.5) 实现中间插入, 避免对其他字段 import_order 的大规模调整"
        verification: |
          重启后导出 relationship 模板, 列顺序:
          关系类型 (6) → 关系方向 (7) → 关系范围 (7.5) → 目标领域 (8) → 目标子领域 (9) → 目标服务模块 (10)
        lesson_learned: |
          1. 浮动 import_order (如 7.5) 是中间插入的最简单方案, 不需要重构排序逻辑
          2. 列分组应基于业务语义 (类型相关/层级相关) 而非 yaml 字段顺序
      - id: BUG-CATEGORY-LABEL-MULTIPLE-PATHS
        title: "category_label 多个空路径: 直 SQL association 路径 + 早 return 路径"
        date: '2026-06-14'
        severity: CRITICAL
        discovered: |
          用户反馈: 关系 sheet 中的"关系范围"列(对应 category_label 字段)为空
        root_cause: |
          上轮修复 (_compute_list_computed_fields_for_export 增加 compute_by_semantics) 只解决了一半问题.
          还有 2 个独立路径被遗漏:

          路径 1: import_export_service._query_association_with_hierarchy_filters
            - 是 direct SQL 查询路径 (不走 search), 仅调用 enrich_records()
            - enrich_records 不知道 hierarchy_scope 字段, 所以 category_label 永远是 None
            - 触发条件: relationship 是 association 类型, _is_association_type() 为 True
            - _query_with_hierarchy 总是走这个路径 (L1762-1763)

          路径 2: query_service.search 早 return 路径 (virtual join sort / count_relations sort)
            - L388 / L444 早 return 跳过 L512-520 的 compute_by_semantics 调用
            - 触发条件: order_by 包含 VIRTUAL storage 字段 (如 updated_at 默认排序)
            - 实际 100% 触发 (updated_at 是 VIRTUAL storage)

          两个路径独立, 必须分别修复.
        fix:
          - "import_export_service.py 新增 _ensure_hierarchy_scope_computed 方法, 封装 compute_by_semantics 调用"
          - "在 _query_association_by_level 和 _query_association_by_version 的 return 前调用 _ensure_hierarchy_scope_computed"
          - "query_service.py 新增 _compute_hierarchy_scope_for_export helper"
          - "search() 主路径 + 2 个早 return 路径都调用该 helper"
        verification: |
          验证脚本: debug_export_path.py
          - Direct search: category_label='同子领域跨服务模块' ✓
          - Via _query_with_hierarchy: category_label='同子领域跨服务模块' ✓ (修复前 None)
        lesson_learned: |
          1. SSOT 审计: 任何"数据查询"路径都必须经过统一的"字段计算"入口
          2. 早 return 路径是 bug 温床, 早 return 前必须确保副作用 (如字段计算) 已执行
          3. 多路径相同 bug 必须分头修复, 不能只修一处就认为全局修好
      - id: SSOT-FIELD-ENRICHMENT-MULTI-PATH
        title: "字段计算 SSOT 审计: 多路径必须对称"
        date: '2026-06-14'
        severity: INFO
        note: |
          关系数据可能从以下路径返回:
          1. query_service.search() 主路径 (计算: _compute_list_computed_fields + compute_by_semantics)
          2. query_service.search() 早 return 路径 (仅 _compute_list_computed_fields, 缺 compute_by_semantics)
          3. import_export_service._query_association_with_hierarchy_filters (仅 enrich_records, 缺 compute_by_semantics)

          添加新的计算字段时, 必须同时更新 3 个路径.
          推荐: 把字段计算封装到独立的 helper 方法, 各路径调用 helper 而不是内联逻辑.
          参考: query_service._compute_hierarchy_scope_for_export()
      - id: SSOT-AUDIT-COMPUTED-FIELDS
        title: "导出与查询路径的计算字段 SSOT 审计"
        date: '2026-06-14'
        severity: INFO
        note: |
          导出路径 (_compute_list_computed_fields_for_export) 与查询路径 (_compute_list_computed_fields)
