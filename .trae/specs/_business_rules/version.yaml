- id: BR-version-FLD-PAT-name
  type: field_constraint
  object: version
  subtype: pattern
  field: name
  pattern: ^[A-Za-z0-9][A-Za-z0-9_.\-]*$
  source: schema:version.yaml:fields[name].semantics.pattern
  derived_scenarios:
  - id: T_VERSION_FLD_PAT_NAME_001
    title: 字段 name 应匹配模式 ^[A-Za-z0-9][A-Za-z0-9_.\-]*$
    priority: P0
    assertion: 'BusinessRuleAssertor.assertRule(''BR-version-FLD-PAT-name'', { field:
      ''name'', pattern: ''^[A-Za-z0-9][A-Za-z0-9_.\-]*$'' })'
- id: BR-version-FLD-IMM-name
  type: field_constraint
  object: version
  subtype: immutable
  field: name
  source: schema:version.yaml:fields[name].semantics.immutable
  derived_scenarios:
  - id: T_VERSION_FLD_IMM_NAME_001
