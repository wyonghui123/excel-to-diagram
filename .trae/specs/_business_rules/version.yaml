- id: BR-version-FLD-ENUM-is_current
  type: field_constraint
  object: version
  subtype: enum
  field: is_current
  allowed_values:
  - 1
  - 0
  default: false
  source: schema:version.yaml:fields[is_current].enum_values
  derived_scenarios:
  - id: T_VERSION_FLD_ENUM_IS_CURRENT_001
