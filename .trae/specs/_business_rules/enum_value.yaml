- id: BR-enum_value-FLD-ENUM-is_active
  type: field_constraint
  object: enum_value
  subtype: enum
  field: is_active
  allowed_values:
  - true
  - false
  default: true
  source: schema:enum_value.yaml:fields[is_active].enum_values
  derived_scenarios:
  - id: T_ENUM_VALUE_FLD_ENUM_IS_ACTIVE_001
    title: 字段 is_active 应在枚举值中,无效值应拒绝
    priority: P0
    assertion: 'BusinessRuleAssertor.assertRule(''BR-enum_value-FLD-ENUM-is_active'',
      { field: ''is_active'', allowed: [True, False] })'
- id: BR-enum_value-FLD-ENUM-is_system
  type: field_constraint
  object: enum_value
  subtype: enum
  field: is_system
  allowed_values:
  - true
  - false
  default: false
  source: schema:enum_value.yaml:fields[is_system].enum_values
  derived_scenarios:
  - id: T_ENUM_VALUE_FLD_ENUM_IS_SYSTEM_001
    title: 字段 is_system 应在枚举值中,无效值应拒绝
    priority: P0
    assertion: 'BusinessRuleAssertor.assertRule(''BR-enum_value-FLD-ENUM-is_system'',
      { field: ''is_system'', allowed: [True, False] })'
