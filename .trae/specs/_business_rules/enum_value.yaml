      field: ''code'', value: null, expected: ''error'' })'
- id: BR-enum_value-FLD-PAT-code
  type: field_constraint
  object: enum_value
  subtype: pattern
  field: code
  pattern: ^[A-Z][A-Z0-9_]*$
  source: schema:enum_value.yaml:fields[code].semantics.pattern
  derived_scenarios:
  - id: T_ENUM_VALUE_FLD_PAT_CODE_001
    title: 字段 code 应匹配模式 ^[A-Z][A-Z0-9_]*$
    priority: P0
    assertion: 'BusinessRuleAssertor.assertRule(''BR-enum_value-FLD-PAT-code'', {
      field: ''code'', pattern: ''^[A-Z][A-Z0-9_]*$'' })'
- id: BR-enum_value-FLD-IMM-code
  type: field_constraint
  object: enum_value
  subtype: immutable
  field: code
  source: schema:enum_value.yaml:fields[code].semantics.immutable
  derived_scenarios:
  - id: T_ENUM_VALUE_FLD_IMM_CODE_001
    title: 字段 code 不可变,修改应拒绝
    priority: P1
    assertion: 'BusinessRuleAssertor.assertRule(''BR-enum_value-FLD-IMM-code'', {
      field: ''code'', value: ''new'', expected: ''error'' })'
- id: BR-enum_value-FLD-REQ-name
  type: field_constraint
  object: enum_value
  subtype: required
  field: name
  source: schema:enum_value.yaml:fields[name].required
  derived_scenarios:
  - id: T_ENUM_VALUE_FLD_REQ_NAME_001
    title: 字段 name 必填,空值应拒绝
    priority: P0
    assertion: 'BusinessRuleAssertor.assertRule(''BR-enum_value-FLD-REQ-name'', {
