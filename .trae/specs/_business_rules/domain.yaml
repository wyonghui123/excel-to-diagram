  subtype: field
  rule: version_id is not None
  message: 版本ID不能为空
  severity: error
  source: schema:domain.yaml:validations[version_id_required]
  derived_scenarios:
  - id: T_DOMAIN_VAL_VERSION_ID_REQUIRED_001
