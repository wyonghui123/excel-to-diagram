schema: domain
name: 领域
total_rules: 20
rules:
- id: BR-domain-DEL
  type: deletability
  object: domain
  condition: self.child_count == 0 and self.relation_count == 0
  message: 存在子领域或关联关系的领域不能删除
  source: schema:domain.yaml:deletability
  derived_scenarios:
  - id: T_DOMAIN_DEL_001
    title: 有依赖时删除应失败
    priority: P0
    expected_deletable: false
    assertion: 'BusinessRuleAssertor.assertRule(''BR-domain-DEL'', { relationCount:
      1, expected: false })'
  - id: T_DOMAIN_DEL_002
    title: 无依赖时删除应成功
    priority: P1
    expected_deletable: true
    assertion: 'BusinessRuleAssertor.assertRule(''BR-domain-DEL'', { relationCount:
      0, expected: true })'
- id: BR-domain-AUTH-check
  type: authorization
  object: domain
  subtype: check
  scope: version_id IN (SELECT v.id FROM versions v JOIN products p ON v.product_id
    = p.id WHERE p.visibility = 'public' OR p.owner_id = $user.id)
  source: schema:domain.yaml:authorization.check
  derived_scenarios:
  - id: T_DOMAIN_AUTH_001
    title: 未授权访问应拒绝
    priority: P0
    expected: false
    assertion: 'BusinessRuleAssertor.assertRule(''BR-domain-AUTH-check'', { authorized:
      false, expected: 403 })'
  - id: T_DOMAIN_AUTH_002
    title: 已授权访问应成功
    priority: P1
    expected: true
    assertion: 'BusinessRuleAssertor.assertRule(''BR-domain-AUTH-check'', { authorized:
      true, expected: 200 })'
- id: BR-domain-INHERIT
  type: authorization
  object: domain
  subtype: inherit
  source: schema:domain.yaml:authorization.inherit_to_children
  derived_scenarios:
  - id: T_DOMAIN_INH_001
    title: 权限应自动继承给子对象
    priority: P1
    assertion: 'BusinessRuleAssertor.assertRule(''BR-domain-INHERIT'', { parentId:
      ..., expectedChildAccess: true })'
