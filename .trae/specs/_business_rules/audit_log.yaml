  object: audit_log
  subtype: state_transition
  state_field: status
  from_states:
  - pending
  to_state: failed
  triggers:
  - before_update
  source: schema:audit_log.yaml:rules[mark_failed]
  derived_scenarios:
  - id: T_AUDIT_LOG_STATE_MARK_FAILED_001
    title: '状态转换: 标记写入失败'
