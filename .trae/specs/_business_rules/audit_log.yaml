schema: audit_log
name: 审计日志
total_rules: 14
rules:
- id: BR-audit_log-STATE-mark-written
  type: rules
  object: audit_log
  subtype: state_transition
  state_field: status
  from_states:
  - pending
  to_state: written
  triggers:
  - before_update
  source: schema:audit_log.yaml:rules[mark_written]
  derived_scenarios:
  - id: T_AUDIT_LOG_STATE_MARK_WRITTEN_001
    title: '状态转换: 标记已写入'
    priority: P1
    assertion: 'BusinessRuleAssertor.assertRule(''BR-audit_log-STATE-mark_written'',
      { from: ''[''pending'']'', to: ''written'' })'
- id: BR-audit_log-STATE-mark-failed
