- id: BR-audit_log-STATE-retry-write
  type: rules
  object: audit_log
  subtype: state_transition
  state_field: status
  from_states:
  - failed
  to_state: pending
  triggers:
  - before_update
  source: schema:audit_log.yaml:rules[retry_write]
  derived_scenarios:
  - id: T_AUDIT_LOG_STATE_RETRY_WRITE_001
    title: '状态转换: 重试写入'
