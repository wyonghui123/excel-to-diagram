schema: relationship
name: 业务关系
total_rules: 28
rules:
- id: BR-relationship-DEL
  type: deletability
  object: relationship
  condition: 'true'
  message: 关系可随时删除
  source: schema:relationship.yaml:deletability
  derived_scenarios:
  - id: T_RELATIONSHIP_DEL_001
    title: 有依赖时删除应失败
    priority: P0
    expected_deletable: false
    assertion: 'BusinessRuleAssertor.assertRule(''BR-relationship-DEL'', { relationCount:
      1, expected: false })'
  - id: T_RELATIONSHIP_DEL_002
    title: 无依赖时删除应成功
    priority: P1
    expected_deletable: true
    assertion: 'BusinessRuleAssertor.assertRule(''BR-relationship-DEL'', { relationCount:
      0, expected: true })'
- id: BR-relationship-AUTH-check
  type: authorization
  object: relationship
  subtype: check
  scope: version_id IN (SELECT v.id FROM versions v JOIN products p ON v.product_id
    = p.id WHERE p.visibility = 'public' OR p.owner_id = $user.id)
  source: schema:relationship.yaml:authorization.check
  derived_scenarios:
  - id: T_RELATIONSHIP_AUTH_001
    title: 未授权访问应拒绝
    priority: P0
    expected: false
    assertion: 'BusinessRuleAssertor.assertRule(''BR-relationship-AUTH-check'', {
      authorized: false, expected: 403 })'
  - id: T_RELATIONSHIP_AUTH_002
    title: 已授权访问应成功
    priority: P1
    expected: true
    assertion: 'BusinessRuleAssertor.assertRule(''BR-relationship-AUTH-check'', {
      authorized: true, expected: 200 })'
