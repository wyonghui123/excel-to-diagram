- id: BR-product-FLD-ENUM-visibility
  type: field_constraint
  object: product
  subtype: enum
  field: visibility
  allowed_values:
  - private
  - public
  default: private
  source: schema:product.yaml:fields[visibility].enum_values
  derived_scenarios:
  - id: T_PRODUCT_FLD_ENUM_VISIBILITY_001
    title: 字段 visibility 应在枚举值中,无效值应拒绝
