- id: BR-product-ASPECT-naming
  type: aspect
  object: product
  aspect: naming_aspect
  source: schema:product.yaml:aspects[naming_aspect]
  derived_scenarios:
  - id: T_PRODUCT_ASPECT_NAMING_ASPECT_001
    title: naming_aspect 切面应正确触发
    priority: P2
    assertion: 'BusinessRuleAssertor.assertRule(''BR-product-ASPECT-naming_aspect'',
      { objectId: ..., aspectFired: true })'
- id: BR-product-VAL-name-required
  type: validations
  object: product
  subtype: field
  rule: name is not None and name != ''
  message: 产品线名称不能为空
  severity: error
  source: schema:product.yaml:validations[name_required]
  derived_scenarios:
  - id: T_PRODUCT_VAL_NAME_REQUIRED_001
    title: '校验: 名称必填 应拒绝无效输入'
    priority: P0
    assertion: 'BusinessRuleAssertor.assertRule(''BR-product-VAL-name_required'',
      { invalid: true, expected: ''error'' })'
- id: BR-product-STATE-activate-product
  type: rules
  object: product
  subtype: state_transition
  state_field: is_active
  from_states:
  - false
  to_state: true
  triggers:
  - before_update
  source: schema:product.yaml:rules[activate_product]
  derived_scenarios:
  - id: T_PRODUCT_STATE_ACTIVATE_PRODUCT_001
    title: '状态转换: 激活产品线'
    priority: P1
    assertion: 'BusinessRuleAssertor.assertRule(''BR-product-STATE-activate_product'',
      { from: ''[False]'', to: ''True'' })'
- id: BR-product-STATE-deactivate-product
  type: rules
  object: product
  subtype: state_transition
  state_field: is_active
  from_states:
  - true
  to_state: false
  triggers:
  - before_update
  source: schema:product.yaml:rules[deactivate_product]
  derived_scenarios:
  - id: T_PRODUCT_STATE_DEACTIVATE_PRODUCT_001
    title: '状态转换: 停用产品线'
    priority: P1
    assertion: 'BusinessRuleAssertor.assertRule(''BR-product-STATE-deactivate_product'',
      { from: ''[True]'', to: ''False'' })'
- id: BR-product-IE-import
  type: import_export
  object: product
  subtype: import
  conflict_strategy: upsert
  conflict_key: code
  cascade: true
  source: schema:product.yaml:import_export.import_enabled
  derived_scenarios:
  - id: T_PRODUCT_IE_IMP_001
    title: 导入应使用 upsert 策略处理冲突
    priority: P1
    assertion: 'BusinessRuleAssertor.assertRule(''BR-product-IE-import'', { strategy:
      ''upsert'', conflictKey: ''code'' })'
- id: BR-product-IE-export
  type: import_export
  object: product
  subtype: export
  cascade: true
  source: schema:product.yaml:import_export.export_enabled
  derived_scenarios:
  - id: T_PRODUCT_IE_EXP_001
    title: 导出应级联包含子对象
    priority: P2
    assertion: 'BusinessRuleAssertor.assertRule(''BR-product-IE-export'', { cascade:
      True })'
- id: BR-product-HIER
