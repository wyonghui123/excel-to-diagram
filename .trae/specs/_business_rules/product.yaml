schema: product
name: 产品线
total_rules: 25
rules:
- id: BR-product-DEL
  type: deletability
  object: product
  condition: self.child_count == 0
  message: 存在版本的产品不能删除
  source: schema:product.yaml:deletability
  derived_scenarios:
  - id: T_PRODUCT_DEL_001
    title: 有依赖时删除应失败
    priority: P0
    expected_deletable: false
    assertion: 'BusinessRuleAssertor.assertRule(''BR-product-DEL'', { relationCount:
      1, expected: false })'
  - id: T_PRODUCT_DEL_002
    title: 无依赖时删除应成功
    priority: P1
    expected_deletable: true
    assertion: 'BusinessRuleAssertor.assertRule(''BR-product-DEL'', { relationCount:
      0, expected: true })'
- id: BR-product-AUTH-check
  type: authorization
  object: product
  subtype: check
  scope: visibility = 'public' OR owner_id = $user.id
  source: schema:product.yaml:authorization.check
  derived_scenarios:
  - id: T_PRODUCT_AUTH_001
    title: 未授权访问应拒绝
    priority: P0
    expected: false
    assertion: 'BusinessRuleAssertor.assertRule(''BR-product-AUTH-check'', { authorized:
      false, expected: 403 })'
  - id: T_PRODUCT_AUTH_002
    title: 已授权访问应成功
    priority: P1
    expected: true
    assertion: 'BusinessRuleAssertor.assertRule(''BR-product-AUTH-check'', { authorized:
      true, expected: 200 })'
- id: BR-product-AUTH-auto_owner
  type: authorization
  object: product
  subtype: auto_owner
  permission: admin
  source: schema:product.yaml:authorization.auto_owner
  derived_scenarios:
  - id: T_PRODUCT_OWNER_001
    title: 创建者自动获得 owner 权限
    priority: P0
    assertion: 'BusinessRuleAssertor.assertRule(''BR-product-AUTH-auto_owner'', {
      creatorId: ..., expectedOwner: ... })'
- id: BR-product-TRANSFER
  type: authorization
  object: product
  subtype: transfer
  keep_permissions: false
  source: schema:product.yaml:authorization.allow_transfer
  derived_scenarios:
  - id: T_PRODUCT_TRANS_001
    title: owner 可转让给其他用户
    priority: P1
    assertion: 'BusinessRuleAssertor.assertRule(''BR-product-TRANSFER'', { from: ownerId,
      to: newOwnerId })'
- id: BR-product-INHERIT
  type: authorization
  object: product
  subtype: inherit
  source: schema:product.yaml:authorization.inherit_to_children
  derived_scenarios:
  - id: T_PRODUCT_INH_001
    title: 权限应自动继承给子对象
    priority: P1
    assertion: 'BusinessRuleAssertor.assertRule(''BR-product-INHERIT'', { parentId:
      ..., expectedChildAccess: true })'
- id: BR-product-AUDIT-create
  type: audit
  object: product
  subtype: audit_create
  fields: all
  source: schema:product.yaml:audit.create
  derived_scenarios:
  - id: T_PRODUCT_AUDIT_CREATE_001
    title: create 操作应记录 audit_log
    priority: P1
    operation: create
    assertion: 'BusinessRuleAssertor.assertRule(''BR-product-AUDIT-create'', { operation:
      ''create'', auditLog: true })'
- id: BR-product-AUDIT-update
  type: audit
  object: product
  subtype: audit_update
  fields: changed_only
  source: schema:product.yaml:audit.update
  derived_scenarios:
  - id: T_PRODUCT_AUDIT_UPDATE_001
    title: update 操作应记录 audit_log
    priority: P1
    operation: update
    assertion: 'BusinessRuleAssertor.assertRule(''BR-product-AUDIT-update'', { operation:
      ''update'', auditLog: true })'
- id: BR-product-AUDIT-delete
  type: audit
  object: product
  subtype: audit_delete
  fields: business_only
  source: schema:product.yaml:audit.delete
  derived_scenarios:
  - id: T_PRODUCT_AUDIT_DELETE_001
    title: delete 操作应记录 audit_log
    priority: P0
    operation: delete
    assertion: 'BusinessRuleAssertor.assertRule(''BR-product-AUDIT-delete'', { operation:
      ''delete'', auditLog: true })'
- id: BR-product-ASPECT-audit
  type: aspect
  object: product
  aspect: audit_aspect
  source: schema:product.yaml:aspects[audit_aspect]
  derived_scenarios:
  - id: T_PRODUCT_ASPECT_AUDIT_ASPECT_001
    title: audit_aspect 切面应正确触发
    priority: P2
    assertion: 'BusinessRuleAssertor.assertRule(''BR-product-ASPECT-audit_aspect'',
