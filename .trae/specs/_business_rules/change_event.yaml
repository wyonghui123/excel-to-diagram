schema: change_event
name: 变更事件
total_rules: 12
rules:
- id: BR-change_event-STATE-process-event
  type: rules
  object: change_event
  subtype: state_transition
  state_field: status
  from_states:
  - pending
  to_state: processing
  triggers:
  - before_update
  source: schema:change_event.yaml:rules[process_event]
  derived_scenarios:
  - id: T_CHANGE_EVENT_STATE_PROCESS_EVENT_001
    title: '状态转换: 开始处理事件'
    priority: P1
    assertion: 'BusinessRuleAssertor.assertRule(''BR-change_event-STATE-process_event'',
      { from: ''[''pending'']'', to: ''processing'' })'
