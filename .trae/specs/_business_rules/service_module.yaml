schema: service_module
name: 服务模块
total_rules: 23
rules:
- id: BR-service_module-DEL
  type: deletability
  object: service_module
  condition: self.child_count == 0 and self.relation_count == 0
  message: 存在业务对象或关联关系的服务模块不能删除
  source: schema:service_module.yaml:deletability
  derived_scenarios:
  - id: T_SERVICE_MODULE_DEL_001
    title: 有依赖时删除应失败
    priority: P0
    expected_deletable: false
    assertion: 'BusinessRuleAssertor.assertRule(''BR-service_module-DEL'', { relationCount:
      1, expected: false })'
  - id: T_SERVICE_MODULE_DEL_002
    title: 无依赖时删除应成功
    priority: P1
    expected_deletable: true
    assertion: 'BusinessRuleAssertor.assertRule(''BR-service_module-DEL'', { relationCount:
      0, expected: true })'
- id: BR-service_module-AUTH-check
  type: authorization
  object: service_module
  subtype: check
  scope: sub_domain_id IN (SELECT sd.id FROM sub_domains sd JOIN domains d ON sd.domain_id
    = d.id JOIN versions v ON d.version_id = v.id JOIN products p ON v.product_id
    = p.id WHERE p.visibility = 'public' OR p.owner_id = $user.id)
  source: schema:service_module.yaml:authorization.check
  derived_scenarios:
  - id: T_SERVICE_MODULE_AUTH_001
    title: 未授权访问应拒绝
    priority: P0
    expected: false
    assertion: 'BusinessRuleAssertor.assertRule(''BR-service_module-AUTH-check'',
      { authorized: false, expected: 403 })'
  - id: T_SERVICE_MODULE_AUTH_002
    title: 已授权访问应成功
    priority: P1
    expected: true
    assertion: 'BusinessRuleAssertor.assertRule(''BR-service_module-AUTH-check'',
      { authorized: true, expected: 200 })'
