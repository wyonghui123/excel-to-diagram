schema: sub_domain
name: 子领域
total_rules: 22
rules:
- id: BR-sub_domain-DEL
  type: deletability
  object: sub_domain
  condition: self.child_count == 0 and self.relation_count == 0
  message: 存在服务模块或关联关系的子领域不能删除
  source: schema:sub_domain.yaml:deletability
  derived_scenarios:
  - id: T_SUB_DOMAIN_DEL_001
    title: 有依赖时删除应失败
    priority: P0
    expected_deletable: false
    assertion: 'BusinessRuleAssertor.assertRule(''BR-sub_domain-DEL'', { relationCount:
      1, expected: false })'
  - id: T_SUB_DOMAIN_DEL_002
    title: 无依赖时删除应成功
    priority: P1
    expected_deletable: true
    assertion: 'BusinessRuleAssertor.assertRule(''BR-sub_domain-DEL'', { relationCount:
      0, expected: true })'
- id: BR-sub_domain-AUTH-check
  type: authorization
  object: sub_domain
  subtype: check
  scope: domain_id IN (SELECT d.id FROM domains d JOIN versions v ON d.version_id
    = v.id JOIN products p ON v.product_id = p.id WHERE p.visibility = 'public' OR
    p.owner_id = $user.id)
  source: schema:sub_domain.yaml:authorization.check
  derived_scenarios:
  - id: T_SUB_DOMAIN_AUTH_001
    title: 未授权访问应拒绝
    priority: P0
    expected: false
    assertion: 'BusinessRuleAssertor.assertRule(''BR-sub_domain-AUTH-check'', { authorized:
      false, expected: 403 })'
  - id: T_SUB_DOMAIN_AUTH_002
    title: 已授权访问应成功
    priority: P1
    expected: true
    assertion: 'BusinessRuleAssertor.assertRule(''BR-sub_domain-AUTH-check'', { authorized:
      true, expected: 200 })'
