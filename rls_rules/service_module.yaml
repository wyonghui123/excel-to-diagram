# M11 RLS 规则：service_module（服务模块）
# 元数据层级最底层：service_module 直接关联代码

entity: service_module

# 行级过滤
row_filters:
  - applies_to: [role:user, role:viewer, role:manager]
    condition: "service_module.company_id == $user.company_id"
  - applies_to: [role:admin]
    condition: "true"
  - applies_to: [role:ai-agent]
    condition: "service_module.is_public == true"

# 字段脱敏（代码路径、Git URL）
field_masks:
  - field: git_url_internal
    mask: "***HIDDEN***"
    applies_to: [role:user, role:viewer, role:ai-agent]
  - field: deploy_token
    mask: "***HIDDEN***"
    applies_to: [role:user, role:viewer, role:manager, role:ai-agent]  # 仅 admin 可见

# 操作权限
actions:
  create: [role:admin, role:manager]
  read: [role:admin, role:manager, role:user, role:viewer, role:ai-agent]
  update: [role:admin, role:manager]
  delete: [role:admin]
  deploy: [role:admin, role:manager]  # 部署权限
