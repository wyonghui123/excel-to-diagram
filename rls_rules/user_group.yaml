# M11 RLS 规则：user_group（用户组）
# 与 role.yaml 类似，但权限粒度不同（用户组是用户的集合）

entity: user_group

# 行级过滤
row_filters:
  # 管理员看所有
  - applies_to: [role:admin, role:manager]
    condition: "true"
  # 普通用户仅看自己所在组
  - applies_to: [role:user, role:viewer]
    condition: "user_group.company_id == $user.company_id"
  # AI Agent 仅看公共组
  - applies_to: [role:ai-agent]
    condition: "user_group.is_public == true"

# 字段脱敏
field_masks:
  - field: member_count
    mask: "***"
    applies_to: [role:viewer, role:ai-agent]
  - field: internal_notes
    mask: "***HIDDEN***"
    applies_to: [role:user, role:viewer, role:ai-agent, role:manager]

# 操作权限
actions:
  create: [role:admin, role:manager]
  read: [role:admin, role:manager, role:user, role:viewer, role:ai-agent]
  update: [role:admin, role:manager]
  delete: [role:admin]
  add_member: [role:admin, role:manager]
  remove_member: [role:admin, role:manager]
