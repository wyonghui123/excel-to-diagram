#!/bin/bash
#===============================================================================
# 日志轮转配置 - logrotate.d/excel-to-diagram
# 用途: 配置系统日志轮转
#===============================================================================

${APP_DIR}/logs/*.log {
    daily
    rotate 14
    compress
    delaycompress
    missingok
    notifempty
    create 0640 appuser appuser
    sharedscripts
    postrotate
        if [ -f "${APP_DIR}/logs/app.log" ]; then
            kill -USR1 $(cat "${APP_DIR}/logs/app.pid 2>/dev/null) 2>/dev/null || true
        fi
    endscript
}

${APP_DIR}/logs/api*.log {
    daily
    rotate 30
    compress
    delaycompress
    missingok
    notifempty
    create 0640 appuser appuser
}
