#===============================================================================
# 备份配置文件 - backup.conf
# 此文件为备份脚本提供默认配置
#===============================================================================

# 备份存储目录
BACKUP_DIR="/opt/app/backups"

# 备份保留天数
RETENTION_DAYS="7"

# 压缩方式: gzip | bzip2 | xz | none
BACKUP_COMPRESSION="gzip"

# 启用各类型备份
ENABLE_DB_BACKUP="true"
ENABLE_APP_BACKUP="true"
ENABLE_LOG_BACKUP="true"

# 远程备份配置
REMOTE_BACKUP_ENABLED="false"
REMOTE_BACKUP_HOST=""
REMOTE_BACKUP_PATH="/opt/app/remote-backups"

# 数据库备份配置
DB_PATHS=(
    "/opt/app/excel-to-diagram/data/app.db"
    "/opt/app/excel-to-diagram/admin/data/app.db"
    "/opt/app/excel-to-diagram/meta/data/architecture.db"
)

# 应用目录
APP_DIR="/opt/app/excel-to-diagram"

# 日志目录
LOG_DIR="/opt/app/excel-to-diagram/logs"
