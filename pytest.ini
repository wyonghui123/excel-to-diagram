[pytest]
testpaths = meta/tests
python_files = test_*.py
python_classes = Test*
python_functions = test_*
norecursedirs = meta/dev meta/tests/performance .* node_modules dist tests_backups

# 标记定义
markers =
    unit: 单元测试 (无外部依赖，快速执行)
    integration: 集成测试 (需要数据库或外部服务)
    e2e: 端到端测试 (完整业务流程)
    slow: 慢速测试 (执行时间 >1s)
    api: API 端点测试
    db: 数据库相关测试
    auth: 认证授权测试
    notification: 变更通知测试
    performance: 性能测试 (基准测试、负载测试、并发测试)
    db_perf: 数据库性能测试
    api_perf: API 性能测试
    index_perf: 索引效果测试
    large_data: 大数据量场景测试
    concurrent: 并发测试
    requires_cleanup: 需要测试后清理资源的测试
    model: 模型测试
    yaml: YAML 加载器测试
    interceptor: 拦截器测试
    association: 关联测试
    filter: 过滤器测试
    permission: 权限测试
    bo_action: BO Action 19 Action 回归套件
    requires_server: 需要 backend server 在跑 (BO Action / SSE 测试)
    subflow: Subflow 引擎测试
    subflow_template: Subflow 模板 CRUD 测试
    db_admin: DB 管理 (健康/备份/恢复) 测试
    # 🆕 v3.18 markers (AI Coding Agent 友好)
    agent_friendly: Agent 写测试辅助 (模板生成/Factory)
    multi_agent: 多 agent 并行隔离测试
    observability: 可观测性测试 (trace_id/log/metrics/diagnostics)
    factory: Test data factory 测试
    template_generator: Test 模板生成器测试
    property_based: hypothesis property-based testing
    mutation: mutation testing (mutmut)
    diagnostics: /_diagnostics 端点测试
    trace_id: trace_id 注入/传播测试
    # 🆕 2026-06-07: GAP 测试分类 markers
    auth_required: 需要 admin 认证的测试 (用 admin_headers fixture)
    deprecated: v1.4 P8 sunset 端点测试 (返回 410)

# 默认选项 - 性能优化版
addopts = 
    -v
    --tb=short
    --strict-markers
    -p no:warnings
    --durations=20
    --dist=loadfile
    --max-worker-restart=0
    --timeout=300
    --timeout-method=thread

# 最小版本
minversion = 7.0

# 忽略警告
filterwarnings =
    ignore::DeprecationWarning
    ignore::PendingDeprecationWarning
    ignore::ResourceWarning

# 测试目录
pythonpath = .

# 日志配置 - 降低日志级别以提升性能
log_cli = false
log_cli_level = WARNING
log_file_level = WARNING
log_file_format = %(asctime)s [%(levelname)8s] %(message)s
log_file_date_format = %H:%M:%S

# 异步支持
asyncio_mode = auto
